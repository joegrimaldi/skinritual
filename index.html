<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#FAF8F5" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<title>skinritual</title>
<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" href="icon.svg" type="image/svg+xml" />
<link rel="apple-touch-icon" href="icon-192.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500;1,600&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#FAF8F5; --text:#26190E; --accent:#8C6444; --muted:#A07850;
    --card:#fff; --line:rgba(140,100,68,.16); --line-strong:rgba(140,100,68,.3);
    --pill-fg:rgba(38,25,14,.74);
    --ok:#6f8f5f; --warn:#b98a3e;
    --shadow:0 1px 8px rgba(38,25,14,.07);
    --shadow-lg:0 8px 30px rgba(38,25,14,.15);
    --r-card:14px; --r-btn:12px; --r-pill:20px;
    --serif:'Cormorant Garamond',Georgia,serif;
    --sans:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    --gutter:16px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg); color:var(--text); font-family:var(--sans);
    font-size:15px; line-height:1.45; -webkit-font-smoothing:antialiased;
    padding-bottom:calc(88px + env(safe-area-inset-bottom));
    touch-action:manipulation; overflow-x:hidden;
  }
  .wrap{max-width:640px;margin:0 auto;padding:0 var(--gutter)}
  button{font-family:var(--sans)}

  /* ---------- Header ---------- */
  header.app{
    position:sticky; top:0; z-index:40; background:rgba(250,248,245,.9);
    backdrop-filter:saturate(1.4) blur(12px); -webkit-backdrop-filter:saturate(1.4) blur(12px);
    border-bottom:1px solid var(--line);
    padding-top:calc(10px + env(safe-area-inset-top));
  }
  .hrow{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
  .logo{font-family:var(--serif);font-size:31px;font-weight:500;letter-spacing:.3px;line-height:1;padding:6px 0 3px}
  .logo b{font-weight:500}
  .logo i{font-style:italic;color:var(--accent)}
  .tagline{font-size:11px;color:var(--muted);letter-spacing:.7px;text-transform:uppercase;margin-bottom:11px}
  .htools{display:flex;align-items:center;gap:8px;padding-top:8px}
  .streakchip{display:flex;align-items:center;gap:5px;background:rgba(140,100,68,.1);color:var(--accent);font-weight:700;font-size:13px;padding:6px 12px;border-radius:var(--r-pill);white-space:nowrap}
  .streakchip.zero{opacity:.5}
  .updbtn{width:36px;height:36px;border-radius:50%;border:1px solid var(--line);background:var(--card);color:var(--muted);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex:none}
  .updbtn:active{transform:rotate(180deg);transition:transform .3s}

  /* ---------- Bottom nav ---------- */
  nav.tabs{
    position:fixed;left:0;right:0;bottom:0;z-index:50;
    background:rgba(255,255,255,.95);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    border-top:1px solid var(--line);
    display:flex;justify-content:space-around;
    padding:8px 6px calc(8px + env(safe-area-inset-bottom));
  }
  nav.tabs button{
    flex:1;background:none;border:none;color:var(--muted);
    font-size:11px;font-weight:600;letter-spacing:.3px;
    display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;
    padding:5px 0;border-radius:10px;transition:color .15s,transform .1s;
  }
  nav.tabs button .ic{font-size:20px;line-height:1}
  nav.tabs button.on{color:var(--accent)}
  nav.tabs button:active{transform:scale(.94)}

  /* ---------- Views ---------- */
  section.view{display:none;padding-top:16px}
  section.view.on{display:block;animation:fade .25s ease}
  @keyframes fade{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
  h2.head{font-family:var(--serif);font-size:27px;font-weight:600;margin:2px 0}
  .sub{color:var(--muted);font-size:13px;margin-bottom:15px}
  #shelfCount{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .linkbtn{background:none;border:none;color:var(--muted);font-family:var(--sans);font-size:12.5px;font-weight:600;text-decoration:underline;cursor:pointer;padding:2px 2px;flex:none}

  /* ---------- Controls ---------- */
  .controls{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
  .search{flex:1;min-width:150px;position:relative}
  .search::before{content:"⌕";position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:16px}
  .search input{
    width:100%;padding:11px 12px 11px 34px;border:1px solid var(--line);
    border-radius:var(--r-btn);background:var(--card);font-family:var(--sans);
    font-size:14px;color:var(--text);
  }
  .search input:focus{outline:none;border-color:var(--line-strong)}
  .chips{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .chips::-webkit-scrollbar{display:none}
  .chip{white-space:nowrap;border:1px solid var(--line);background:var(--card);color:var(--muted);
    font-size:12.5px;font-weight:600;padding:6px 13px;border-radius:var(--r-pill);cursor:pointer;flex:none}
  .chip.on{background:var(--accent);color:#fff;border-color:var(--accent)}

  /* ---------- Product grid ---------- */
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .card{background:var(--card);border-radius:var(--r-card);box-shadow:var(--shadow);
    padding:12px;position:relative;display:flex;flex-direction:column;gap:8px;overflow:hidden}
  .tile{height:74px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:34px}
  .brand{font-size:10.5px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--muted)}
  .pname{font-family:var(--serif);font-size:18px;font-weight:600;line-height:1.12;margin:-2px 0 0}
  .tagrow{display:flex;flex-wrap:wrap;gap:5px;margin-top:auto}
  .pill{font-size:10.5px;font-weight:600;padding:3px 8px;border-radius:var(--r-pill);color:var(--pill-fg)}
  .tg{font-size:10.5px;font-weight:600;padding:3px 7px;border-radius:var(--r-pill);background:rgba(140,100,68,.08);color:var(--muted)}
  .qty{display:flex;align-items:center;justify-content:space-between;gap:6px;margin-top:2px}
  .qbtns{display:flex;align-items:center;gap:8px}
  .qbtn{width:30px;height:30px;border-radius:9px;border:1px solid var(--line);background:var(--bg);color:var(--accent);
    font-size:18px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .qn{min-width:18px;text-align:center;font-weight:700;font-size:15px}
  .rm{background:none;border:none;color:var(--muted);opacity:.55;font-size:15px;cursor:pointer;padding:4px}
  .lowbadge{position:absolute;top:10px;right:10px;background:var(--warn);color:#fff;font-size:9.5px;font-weight:700;
    letter-spacing:.4px;padding:3px 7px;border-radius:var(--r-pill);text-transform:uppercase;z-index:2}
  .oos{position:absolute;inset:0;background:rgba(250,248,245,.82);backdrop-filter:blur(1px);
    display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;z-index:3;border-radius:var(--r-card)}
  .oos .lab{font-weight:700;color:var(--muted);font-size:12.5px;letter-spacing:.4px;text-transform:uppercase}
  .oos button{border:1px solid var(--line);background:var(--card);color:var(--accent);font-weight:600;
    font-size:12.5px;padding:6px 14px;border-radius:var(--r-pill);cursor:pointer}

  /* ---------- Buttons ---------- */
  .btn{display:block;width:100%;text-align:center;border:none;border-radius:var(--r-btn);
    padding:14px;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:.2px}
  .btn.primary{background:var(--accent);color:#fff;box-shadow:var(--shadow)}
  .btn.primary:active{transform:translateY(1px)}
  .btn.ghost{background:var(--card);color:var(--accent);border:1px solid var(--line)}

  /* ---------- Segmented toggle ---------- */
  .segwrap{display:flex;background:rgba(140,100,68,.09);border-radius:var(--r-btn);padding:4px;margin-bottom:12px}
  .segwrap button{flex:1;border:none;background:none;color:var(--muted);font-weight:700;font-size:14px;
    padding:10px;border-radius:9px;cursor:pointer;transition:.15s}
  .segwrap button.on{background:var(--card);color:var(--text);box-shadow:var(--shadow)}
  #tierSeg button{flex-direction:column;gap:1px;line-height:1.1;padding:8px 4px}
  #tierSeg .segt{font-size:13px}
  #tierSeg .segsub{font-size:10px;font-weight:600;opacity:.7}
  .togrow{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
  .tog{flex:1 1 30%;border:1px solid var(--line);background:var(--card);color:var(--muted);font-family:var(--sans);
    font-weight:600;font-size:13px;padding:11px 8px;border-radius:var(--r-btn);cursor:pointer;transition:.15s;white-space:nowrap}
  .tog.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .tog.due:not(.on){border-color:var(--warn);box-shadow:0 0 0 1px var(--warn) inset}
  .tog.due:not(.on)::after{content:"•";color:var(--warn);margin-left:4px;font-weight:800}
  .recbar{font-size:12px;color:var(--muted);margin-bottom:12px;display:flex;flex-wrap:wrap;gap:6px;align-items:center}
  .recpill{border:1px solid var(--warn);background:rgba(185,138,62,.1);color:#8a6516;font-family:var(--sans);
    font-size:12px;font-weight:700;padding:5px 11px;border-radius:var(--r-pill);cursor:pointer}
  .amgroup{border:1px solid var(--line);border-radius:11px;margin-bottom:8px;background:var(--card);overflow:hidden}
  .amgroup>summary{list-style:none;cursor:pointer;padding:11px 13px;font-size:13px;font-weight:700;color:var(--text);display:flex;align-items:center}
  .amgroup>summary::-webkit-details-marker{display:none}
  .amgroup>summary::after{content:"⌄";margin-left:auto;color:var(--muted);font-size:16px;transition:transform .2s}
  .amgroup[open]>summary::after{transform:rotate(180deg)}
  .amcount{background:rgba(140,100,68,.12);color:var(--accent);font-size:11px;font-weight:700;padding:1px 8px;border-radius:var(--r-pill);margin-left:8px}
  .amgroup .amitem{border:none;border-top:1px solid var(--line);border-radius:0;margin:0}
  .amitem.on{border-color:var(--accent);background:rgba(140,100,68,.08)}
  .amitem.on .amadd{color:var(--accent)}
  .updbtn.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .tripnights{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;font-size:14px;font-weight:600}
  .tripbanner{display:flex;align-items:center;gap:8px;background:rgba(140,100,68,.09);color:var(--accent);
    font-size:12.5px;font-weight:700;padding:9px 13px;border-radius:var(--r-btn);margin-bottom:12px}
  .kitbadge{position:absolute;top:10px;right:10px;background:var(--accent);color:#fff;font-size:11px;
    padding:2px 7px;border-radius:var(--r-pill);z-index:2}
  .qmeter{margin-bottom:12px}
  .qbar{height:10px;border-radius:6px;background:rgba(140,100,68,.12);overflow:hidden}
  .qfill{height:100%;background:var(--accent);border-radius:6px;transition:width .2s}
  .qlab{font-size:12px;color:var(--muted);font-weight:600;margin-top:5px}
  .kitrow{border:1px solid var(--line);border-radius:11px;background:var(--card);margin-bottom:6px;padding:4px 10px 4px 4px;
    display:flex;align-items:center;flex-wrap:wrap;gap:4px}
  .kitrow.on{border-color:var(--accent);background:rgba(140,100,68,.06)}
  .kittoggle{flex:1;min-width:0;display:flex;align-items:center;gap:8px;border:none;background:none;cursor:pointer;
    font-family:var(--sans);font-size:13.5px;color:var(--text);text-align:left;padding:7px 4px}
  .kittoggle .amn b{color:var(--muted);font-weight:600}
  .kitrow.on .kittoggle .amadd{color:var(--accent);font-weight:700}
  .sizechip{flex:none;font-size:11px;font-weight:700;padding:4px 9px;border-radius:var(--r-pill);cursor:pointer;white-space:nowrap}
  .sizechip.ok{background:rgba(111,143,95,.16);color:var(--ok)}
  .sizechip.warn{background:rgba(185,138,62,.18);color:#8a6516}
  .sizechip.solid{background:rgba(140,100,68,.08);color:var(--muted);cursor:default}
  .sizechip.checked{background:rgba(63,107,130,.14);color:#3f6b82}
  .kitfix{flex-basis:100%;font-size:11.5px;color:#8a6516;padding:2px 4px 6px 40px}
  .kitfix button{background:none;border:none;color:var(--accent);font-weight:700;font-size:11.5px;cursor:pointer;padding:0}
  .venue{font-size:10px;font-weight:700;padding:2px 7px;border-radius:var(--r-pill);margin-left:6px;vertical-align:middle}
  .venue.shower{background:#dbe8ef;color:#3f6b82}
  .venue.sink{background:rgba(140,100,68,.12);color:var(--accent)}
  .addmenu{margin-top:18px}
  .addmenu h3{font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:0 0 4px}
  .addmenu .amsub{font-size:12px;color:var(--muted);margin-bottom:10px}
  .amcat{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin:12px 0 6px}
  .amitem{display:block;width:100%;text-align:left;border:1px solid var(--line);background:var(--card);border-radius:11px;
    padding:9px 12px;margin-bottom:6px;cursor:pointer;font-family:var(--sans)}
  .amitem .amn{font-size:13.5px;font-weight:600;color:var(--text)}
  .amitem .amn b{color:var(--muted);font-weight:600}
  .amitem .amwhy{font-size:11.5px;color:var(--muted);margin-top:2px}
  .amitem .amadd{float:right;color:var(--accent);font-weight:700;font-size:16px;line-height:1}
  .stepx{margin-left:auto;background:none;border:none;color:var(--muted);opacity:.5;font-size:14px;cursor:pointer;padding:2px 4px;flex:none}
  .ritualest{font-size:12px;font-weight:700;color:var(--accent);background:rgba(140,100,68,.09);
    display:inline-block;padding:6px 12px;border-radius:var(--r-pill);margin-bottom:14px}
  .anchor{margin-bottom:14px}
  .anchor label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:600}
  select.f{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:var(--r-btn);
    background:var(--card);font-family:var(--sans);font-size:14px;color:var(--text);appearance:none}

  /* ---------- Routine steps ---------- */
  .step{background:var(--card);border-radius:var(--r-card);box-shadow:var(--shadow);padding:15px 15px 15px 14px;
    margin-bottom:11px;display:flex;gap:13px}
  .stepn{flex:none;width:30px;height:30px;border-radius:50%;background:rgba(140,100,68,.12);color:var(--accent);
    font-weight:700;font-size:14px;display:flex;align-items:center;justify-content:center;margin-top:2px}
  .step .verb{font-family:var(--serif);font-size:20px;font-weight:600;line-height:1.1}
  .step .who{font-size:12.5px;color:var(--muted);margin:2px 0 6px}
  .step .who b{color:var(--text);font-weight:600}
  .step .how{font-size:13.5px;line-height:1.4}
  .step .metarow{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
  .step .metarow span{font-size:10.5px;font-weight:600;color:var(--muted);background:rgba(140,100,68,.08);
    padding:3px 8px;border-radius:var(--r-pill)}
  .protip{background:linear-gradient(180deg,#fff,#fbf6ef);border:1px solid var(--line);border-radius:var(--r-card);
    padding:15px;margin-top:6px}
  .protip .t{font-family:var(--serif);font-size:18px;font-weight:600;margin-bottom:4px}
  .protip .b{font-size:13.5px;color:var(--muted);line-height:1.45}
  .skipwrap{margin-top:16px}
  .skipwrap h3{font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:0 0 8px}
  .skip{background:rgba(140,100,68,.05);border-radius:11px;padding:11px 13px;margin-bottom:8px}
  .skip .n{font-weight:600;font-size:13.5px}
  .skip .w{font-size:12.5px;color:var(--muted);margin-top:2px}

  /* ---------- Rhythm ---------- */
  .hero{background:var(--card);border-radius:var(--r-card);box-shadow:var(--shadow);padding:22px;text-align:center;margin-bottom:16px}
  .hero .big{font-family:var(--serif);font-size:54px;font-weight:600;line-height:1}
  .hero .lab{font-size:13px;color:var(--muted);margin-top:4px}
  .panel{background:var(--card);border-radius:var(--r-card);box-shadow:var(--shadow);padding:16px;margin-bottom:16px}
  .panel h3{font-family:var(--serif);font-size:19px;font-weight:600;margin:0 0 12px}
  .sched{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:9px 0;border-top:1px solid var(--line)}
  .sched:first-of-type{border-top:none}
  .sched .nm{font-size:13.5px;font-weight:600}
  .sched .br{font-size:11px;color:var(--muted)}
  .statuspill{font-size:11px;font-weight:700;padding:4px 10px;border-radius:var(--r-pill);white-space:nowrap;flex:none}
  .statuspill.ready{background:rgba(111,143,95,.16);color:var(--ok)}
  .statuspill.wait{background:rgba(185,138,62,.16);color:var(--warn)}
  .week7{display:flex;flex-direction:column;gap:7px}
  .night{display:flex;align-items:center;gap:11px}
  .night .day{flex:none;width:64px;font-size:12px;font-weight:700;color:var(--muted)}
  .night .plan{flex:1;background:rgba(140,100,68,.06);border-radius:9px;padding:8px 11px;font-size:13px}
  .night.today .plan{background:rgba(140,100,68,.13);font-weight:600}
  .night .plan.rest{color:var(--muted)}
  .logitem{display:flex;align-items:center;gap:11px;padding:10px 0;border-top:1px solid var(--line)}
  .logitem:first-of-type{border-top:none}
  .logitem .when{font-size:13px;font-weight:600}
  .logitem .sub2{font-size:11.5px;color:var(--muted)}
  .dots{display:flex;gap:3px;margin-left:auto;flex-wrap:wrap;max-width:120px;justify-content:flex-end}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--accent);opacity:.5}
  .empty{text-align:center;color:var(--muted);font-size:14px;padding:34px 16px;line-height:1.5}
  .emptybig{padding:64px 24px}

  /* ---------- Calendar ---------- */
  .calhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .caltitle{font-family:var(--serif);font-size:19px;font-weight:600}
  .calnav{width:32px;height:32px;border-radius:9px;border:1px solid var(--line);background:var(--card);color:var(--accent);font-size:18px;line-height:1;cursor:pointer}
  .calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
  .caldow{margin-bottom:5px}
  .caldow span{text-align:center;font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.3px}
  .calday{aspect-ratio:1;border:none;background:rgba(140,100,68,.05);border-radius:9px;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:1px;cursor:pointer;color:var(--text);padding:0;position:relative}
  .calday.empty{background:none;cursor:default}
  .calday .cn{font-size:12.5px;font-weight:600}
  .calday .cmk{font-size:8px;line-height:1}
  .calday.has{background:rgba(140,100,68,.16)}
  .calday.today{outline:2px solid var(--accent);outline-offset:-2px}
  .calday.sel{background:var(--accent);color:#fff}
  .caldetail{margin-top:14px;border-top:1px solid var(--line);padding-top:12px}
  .cd-date{font-family:var(--serif);font-size:17px;font-weight:600;margin-bottom:8px}
  .cd-entry{margin-bottom:10px}
  .cd-mode{font-size:12.5px;font-weight:700;color:var(--accent);margin-bottom:3px}
  .cd-entry ul{margin:0;padding-left:18px}
  .cd-entry li{font-size:13px;line-height:1.5}
  .cd-none{font-size:13px;color:var(--muted)}
  .cd-mode{display:flex;align-items:center}
  .cd-del{margin-left:auto;background:none;border:none;color:var(--muted);opacity:.55;font-size:14px;cursor:pointer;padding:2px 4px;flex:none}
  .cd-del:active{opacity:1}
  .cd-add{font-size:12px;color:var(--muted);margin-top:12px;padding-top:12px;border-top:1px solid var(--line)}
  .cd-addbtn{border:1px solid var(--line);background:var(--card);color:var(--accent);font-family:var(--sans);

  /* ---------- Toast ---------- */

    background:var(--text);color:#fff;padding:10px 18px;border-radius:var(--r-pill);font-size:13.5px;font-weight:600;

  @keyframes pop{from{transform:scale(.9);opacity:0}to{transform:none;opacity:1}}
  .recapcard .fire{font-size:56px;line-height:1}

<script>
"use strict";
/* ============================================================
   skinritual — single-file PWA. No build step, no backend.
   All product data hardcoded; state persists in localStorage.
   ============================================================ */

const $  = (s,r=document)=>r.querySelector(s);
const $$ = (s,r=document)=>[...r.querySelectorAll(s)];
const DAY = 86400000;
const APP_VERSION = "v35";               // shown in footer; keep in sync with sw.js CACHE
const KEY = "skinritual-v2";            // storage key — DO NOT change (would wipe shelves)
const esc = s => String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

/* ---------- Categories (key → label, pastel pill, emoji) ---------- */
const CATS = {
  cleanser:   {label:"Cleanser",    pill:"#e7dccd", emoji:"🫧"},
  toner:      {label:"Toner",       pill:"#dfe8de", emoji:"💧"},
  serum:      {label:"Serum",       pill:"#e3ddef", emoji:"🧪"},
  eye_cream:  {label:"Eye Cream",   pill:"#f0e2d9", emoji:"👁️"},
  moisturizer:{label:"Moisturizer", pill:"#f3e9d9", emoji:"🌸"},
  night_cream:{label:"Night Cream", pill:"#dde1ef", emoji:"🌙"},
  sunscreen:  {label:"SPF",         pill:"#fdeecb", emoji:"☀️"},
  exfoliant:  {label:"Exfoliant",   pill:"#f2dede", emoji:"✨"},
  spot:       {label:"Spot Treat",  pill:"#f4dcd0", emoji:"🎯"},
  mask:       {label:"Mask",        pill:"#e3ded4", emoji:"🎭"},
  sheet_mask: {label:"Sheet Mask",  pill:"#e8e0ec", emoji:"🍃"},
  retinol:    {label:"Retinol",     pill:"#efdbd0", emoji:"🌀"},
};
const catInfo = c => CATS[c] || {label:c, pill:"#eee", emoji:"🧴"};

/* Category → step bucket. 0 = mask/sheet (special, anchor-only). */
const STEP_OF = {cleanser:1,toner:2,serum:3,retinol:3,exfoliant:3,spot:3,eye_cream:4,
  moisturizer:5,night_cream:5,sunscreen:6,mask:0,sheet_mask:0};

/* ---------- Per-category how-to: [verb, sentence] ---------- */
const CAT_HOWTO = {
  cleanser:["Cleanse","Work into a soft foam on damp skin, rinse."],
  toner:["Tone","Sweep or mist over skin to rebalance and prep."],
  serum:["Treat","Press a few drops evenly into skin."],
  eye_cream:["Eye cream","Tap a rice-grain amount around the orbital bone."],
  moisturizer:["Moisturize","Smooth an even layer over face and neck."],
  night_cream:["Night cream","Massage a nourishing layer in as your last step."],
  sunscreen:["SPF","Two fingers' worth, last step. Wait 2–3 min before sun/makeup."],
  exfoliant:["Exfoliate","Apply to dry skin, PM only. Avoid the eye area."],
  retinol:["Retinol","Pea-size on dry skin. PM only, never with a strong exfoliant."],
  spot:["Spot treat","Dab a thin layer only on the blemish."],
  mask:["Mask","Apply an even layer, leave on, then rinse."],
  sheet_mask:["Sheet mask","Lay onto clean skin 15–20 min, then pat in the essence."],
};
const howtoFor = p => (p.verb && p.how) ? [p.verb, p.how] : (CAT_HOWTO[p.cat] || [catInfo(p.cat).label,"Apply as directed."]);

/* ============================================================
   State
   ============================================================ */
let DB = {ver:2, products:[], log:[]};
let period = "morning";   // 'morning' | 'refresh' | 'evening'
let tierIx = 0;           // 0 or 1 within the period's two options
// Time-of-day → two tiers each. Maps to engine {mode, scope, shower}.
const TIERS = {
  morning: [ {t:"Quick", s:"basics, out the door", mode:"am", scope:"quick"},
             {t:"Full",  s:"a bit more · ≤20 min",  mode:"am", scope:"daily"} ],
  refresh: [ {t:"Sink",  s:"quick midday reset",    mode:"refresh", scope:"quick"},
             {t:"Shower",s:"stretch it · ≤20 min",  mode:"refresh", scope:"daily", shower:true} ],
  evening: [ {t:"Quick", s:"bedtime essentials",    mode:"pm", scope:"daily"},
             {t:"Full facial", s:"the works · ≤60 min", mode:"pm", scope:"full", shower:true} ],
};
function resolveTier(){ return TIERS[period][tierIx] || TIERS[period][0]; }
function updateTierLabels(){ const a=TIERS[period];
  if($("#tier0t")){ $("#tier0t").textContent=a[0].t; $("#tier0s").textContent=a[0].s; $("#tier1t").textContent=a[1].t; $("#tier1s").textContent=a[1].s; } }
let includeShave = false;
let includeNoseWax = false;
let includeDryBrush = false;
let picks = new Set(); // product ids the user hand-picked to include
let excluded = new Set(); // product ids removed from tonight's proposed ritual
let openCats = new Set(); // expanded categories in the "Add to tonight" menu
// Recommended cadence (days) + minutes for grooming activities. dryBrush=1 → up to daily.
const CADENCE = { shave:3, noseWax:21, dryBrush:1 };
const GROOM_MIN = { shave:6, noseWax:9, dryBrush:3 };
const GROOM_LABEL = { shave:"🪒 Shave", noseWax:"👃 Nose wax", dryBrush:"🖌️ Dry brush" };
let filter = "All";  // shelf category filter
let query = "";

function freshDB(){ return {ver:2, products:[], log:[]}; }
function load(){
  try{
    const raw = localStorage.getItem(KEY);
    if(!raw){ DB = freshDB(); save(); return; }
    const parsed = JSON.parse(raw);
    // spread preserves extra top-level fields (lastBackupTs, future trip, …)
    DB = {...parsed, ver:parsed.ver||2, products:parsed.products||[], log:parsed.log||[]};
  }catch(e){ DB = freshDB(); }
}
function save(){ try{ localStorage.setItem(KEY, JSON.stringify(DB)); }catch(e){} }

/* ---------- Backup / restore (guards against localStorage eviction) ---------- */
function exportBackup(){
  try{
    DB.lastBackupTs = Date.now(); save();
    const d=new Date(), pad=n=>String(n).padStart(2,"0");
    const fname=`skinritual-backup-${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}.json`;
    const blob=new Blob([JSON.stringify(DB,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a"); a.href=url; a.download=fname; document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),1500);
    toast("Backup downloaded ⬇︎"); renderRhythm();
  }catch(e){ toast("Export failed"); }
}
function importBackup(file){
  const r=new FileReader();
  r.onload=()=>{
    let data; try{ data=JSON.parse(r.result); }catch(e){ toast("Not a valid backup file"); return; }
    if(!data || !Array.isArray(data.products) || !Array.isArray(data.log)){ toast("Not a skinritual backup"); return; }
    const replace = confirm(`Backup has ${data.products.length} products and ${data.log.length} log entries.\n\nOK = REPLACE everything here with the backup.\nCancel = MERGE (add missing products + combine history).`);
    if(replace){
      DB = {...data, ver:data.ver||2, products:data.products, log:data.log};
    } else {
      const haveIds=new Set(DB.products.map(p=>p.id));
      data.products.forEach(p=>{ if(!haveIds.has(p.id)) DB.products.push(p); });
      const haveTs=new Set(DB.log.map(e=>e.ts));
      data.log.forEach(e=>{ if(!haveTs.has(e.ts)) DB.log.push(e); });
      DB.log.sort((a,b)=>a.ts-b.ts);
    }
    save(); refreshStreak(); renderChips(); renderShelf(); renderRhythm();
    toast(replace?"Restored from backup":"Backup merged");
  };
  r.onerror=()=>toast("Couldn't read that file");
  r.readAsText(file);
}
function lastBackupText(){ if(!DB.lastBackupTs) return "never"; const d=daysSince(DB.lastBackupTs); return d===0?"today":d===1?"yesterday":`${d} days ago`; }
function backupOverdue(){ return !DB.lastBackupTs ? DB.log.length>0 : daysSince(DB.lastBackupTs)>=14; }

/* ============================================================
   Pure logic (testable)
   ============================================================ */
function daysSince(ts){ return ts ? Math.floor((Date.now()-ts)/DAY) : Infinity; }
function usesInLast7(id, atTs=Date.now()){
  return DB.log.filter(e => (atTs - e.ts) < 7*DAY && (atTs - e.ts) >= 0 && e.products.includes(id)).length;
}
// When a trip is active, scope everything (rituals, forecast, add-menu) to the kit.
// _excl (set only during a buildRoutine call) drops products removed from tonight's ritual.
let _excl = null;
function inStock(pred){ const t=DB.trip; return DB.products.filter(p => p.qty>0 && (!t || t.kit.includes(p.id)) && (!_excl || !_excl.has(p.id)) && pred(p)); }
// Pick ONE product, rotating to the least-recently-used so no single bottle
// gets overused; `rank` (fav/light/etc.) only breaks ties among equal recency.
function pick(pred, rank){
  const c = inStock(pred);
  if(!c.length) return undefined;
  c.sort((a,b)=>{
    const la=a.lastUsed||0, lb=b.lastUsed||0;
    if(la!==lb) return la-lb;               // least-recently-used first
    if(rank){ const d=rank(a,b); if(d) return d; }
    return a.id-b.id;
  });
  return c[0];
}
function activeAvailable(p){
  if(daysSince(p.lastUsed) < p.cd) return false;       // cooldown not elapsed
  if(p.max && usesInLast7(p.id) >= p.max) return false; // weekly cap hit
  return true;
}
const preferFav   = (a,b)=>(b.fav?1:0)-(a.fav?1:0);
const preferLight = (a,b)=>(b.light?1:0)-(a.light?1:0);
const preferMedicube = (a,b)=>(a.brand==="Medicube"?-1:0)-(b.brand==="Medicube"?-1:0);

/* Build an ordered routine driven by scope, shave, location, and hand-picked
   products. Returns {steps:[{p,verb,how,meta:[]}], skips:[{p,why}]}. */
function buildRoutine(routineMode, opts={}){
  _excl = opts.exclude || null;                        // products removed from tonight
  const scope = opts.scope || "daily";                 // 'quick' | 'daily' | 'full'
  const shave = !!opts.shave;
  const noseWax = !!opts.noseWax;
  const dryBrush = !!opts.dryBrush;
  const picks = new Set((opts.picks||[]).map(Number));
  const steps=[], skips=[], used=new Set();

  const add=(p, override, meta)=>{
    if(!p || used.has(p.id)) return;
    used.add(p.id);
    const [v,h] = override || howtoFor(p);
    steps.push({p, verb:v, how:h, meta:meta||[]});
  };
  // Dry grooming happens FIRST, before cleansing (never in the shower):
  // dry brush → shave → nose wax.
  const dryBrushStep = () => steps.push({ dryBrush:true, groom:true,
    verb:"🖌️ Dry brush", how:"The very first step, on completely dry skin — brush gently upward and outward for ~2 min to stimulate and lightly exfoliate before you shave or cleanse.",
    meta:["grooming · first"], p:{id:-3, cat:"groom", brand:"", name:"Dry brush"} });
  const shaveStep = () => steps.push({ shave:true, groom:true,
    verb:"🪒 Shave", how:"Electric/clipper shave on dry skin, before you cleanse — go with the grain, light pressure. Skip strong actives so freshly-shaved skin can recover.",
    meta:["grooming"], p:{id:-1, cat:"shave", brand:"", name:"Shave"} });
  const noseWaxStep = () => steps.push({ noseWax:true, groom:true,
    verb:"👃 Nose wax", how:"Warm the wax, coat the applicator, insert and hold ~90s, then remove. Only every ~3 weeks.",
    meta:["grooming · last"], p:{id:-2, cat:"groom", brand:"", name:"Nose wax"} });
  if(dryBrush) dryBrushStep();  // dry brush is always first
  if(shave) shaveStep();        // nose wax is added at the very end

  // scope → which optional steps turn on
  const SC = ({
    quick:{toner:false, eye:false, active:false, mask:false, sheet:false, dbl:false},
    daily:{toner:true,  eye:true,  active:true,  mask:false, sheet:false, dbl:true},
    full: {toner:true,  eye:true,  active:true,  mask:true,  sheet:true,  dbl:true},
  })[scope] || {};

  const pickedCat = c => [...picks].some(id=>{const p=DB.products.find(x=>x.id===id); return p && p.cat===c && p.qty>0;});
  const want = (c, on) => on || pickedCat(c);                       // a picked product forces its category on
  const pickInc = (pred, rank) => pick(p=>pred(p) && picks.has(p.id), rank) || pick(pred, rank); // prefer picked
  // On shave nights, prefer soothing products for the hydrate/moisturize slots.
  const pickSoothe = (pred, rank) => pick(p=>pred(p) && picks.has(p.id), rank)
    || (shave ? pick(p=>pred(p) && p.soothing, rank) : null)
    || pick(pred, rank);
  const addSoothe = (pred, rank) => { const p=pickSoothe(pred, rank); add(p, null, (shave && p && p.soothing) ? ["🌿 soothing"] : []); };

  const isPM = routineMode==="pm";
  const isRefresh = routineMode==="refresh";
  const enableActive = SC.active && isPM && !shave;                 // actives: PM only, never on shave nights

  if(isRefresh){
    // ---------- MIDDAY REFRESH ---------- gentle, no actives, moisturizer (not night cream), SPF optional
    add(pickInc(p=>p.cat==="cleanser" && !p.oil, preferFav), ["Refresh","A quick cleanse or a damp-cloth wipe to reset midday."]);
    if(want("toner", SC.toner)) add(pickInc(p=>p.cat==="toner", preferMedicube));
    addSoothe(p=>p.hydra);
    if(want("eye_cream", SC.eye)) add(pickInc(p=>p.cat==="eye_cream"));
    addSoothe(p=>p.cat==="moisturizer", preferLight);
    // SPF is optional midday — include it before ~4pm, otherwise note it's skippable
    const hr=new Date().getHours();
    if(hr<16) add(pickInc(p=>p.cat==="sunscreen", preferFav), null, ["optional · reapply if you'll be outside"]);
    else { const s=pick(p=>p.cat==="sunscreen"); if(s) skips.push({p:s, why:"Late in the day — SPF optional; skip if you're in for the evening."}); }
    inStock(p=>p.active).forEach(p=>skips.push({p, why:"Midday refresh — save actives for your evening ritual."}));
  } else if(!isPM){
    // ---------- MORNING ----------
    add(pickInc(p=>p.am && p.cat==="cleanser", preferFav));
    if(want("toner", SC.toner)) add(pickInc(p=>p.am && p.cat==="toner", preferMedicube));
    addSoothe(p=>p.am && p.hydra);
    if(want("eye_cream", SC.eye)) add(pickInc(p=>p.am && p.cat==="eye_cream"));
    addSoothe(p=>p.am && p.cat==="moisturizer", preferLight);
    add(pickInc(p=>p.am && p.cat==="sunscreen", preferFav), null, ["always last · wait 2–3 min"]);
    inStock(p=>p.active).forEach(p=>skips.push({p, why:"No actives in the morning — actives are PM only."}));
  } else {
    // ---------- EVENING ----------
    if(SC.dbl || pickedCat("cleanser")) add(pickInc(p=>p.oil));
    add(pickInc(p=>p.cat==="cleanser" && !p.oil, preferFav));

    // mask step (full scope, or a picked mask/sheet)
    if(!shave && (want("mask", SC.mask) || want("sheet_mask", SC.sheet))){
      const m = pick(p=>p.cat==="mask" && picks.has(p.id))
             || pick(p=>p.cat==="sheet_mask" && picks.has(p.id))
             || pick(p=>p.cat==="mask") || pick(p=>p.cat==="sheet_mask");
      if(m){ const [ ,mh]=howtoFor(m);
        add(m, [m.cat==="mask"?"Mask":"Sheet mask", mh], []); }
    }

    if(want("toner", SC.toner)) add(pickInc(p=>p.pm && p.cat==="toner", preferMedicube));

    if(enableActive){
      const active = pick(p=>p.active && picks.has(p.id))
        || inStock(p=>p.active && activeAvailable(p)).sort((a,b)=>daysSince(b.lastUsed)-daysSince(a.lastUsed))[0]
        || null;
      if(active){
        const m=[]; if(active.max) m.push(`max ${active.max}×/week`);
        m.push(active.cat==="retinol" ? "retinol night" : "exfoliation night");
        add(active, null, m);
        inStock(p=>p.active && p.id!==active.id).forEach(p=>{
          const clash = (active.cat==="retinol"&&p.cat==="exfoliant")||(active.cat==="exfoliant"&&p.cat==="retinol");
          skips.push({p, why: clash?"Don't layer with tonight's active — alternate on separate nights.":"One active per night is plenty."});
        });
      } else {
        inStock(p=>p.active).forEach(p=>{
          const dLeft=Math.max(0,p.cd-daysSince(p.lastUsed));
          const capped=p.max && usesInLast7(p.id)>=p.max;
          skips.push({p, why: capped?`Weekly limit reached (${p.max?`max ${p.max}×/week`:p.freq}).`:`On cooldown — available in ${dLeft} day${dLeft===1?"":"s"}.`});
        });
      }
    } else if(shave){
      inStock(p=>p.active).forEach(p=>skips.push({p, why:"Freshly shaved — skipping actives tonight so your skin can recover. Save them for a non-shave night."}));
    } else {
      inStock(p=>p.active).forEach(p=>skips.push({p, why:"Quick refresh — skipping actives. Switch to Daily or Full to schedule one."}));
    }

    addSoothe(p=>p.pm && p.hydra);
    if(want("eye_cream", SC.eye)) add(pickInc(p=>p.pm && p.cat==="eye_cream"));
    const night = pickSoothe(p=>p.cat==="night_cream") || pickSoothe(p=>p.pm && p.cat==="moisturizer", preferLight);
    add(night, null, (shave && night && night.soothing) ? ["🌿 soothing"] : []);
  }

  // Force-include any picked product not yet placed (e.g. a spot treatment) —
  // but keep one-per-kind: skip if its category is already covered.
  [...picks].forEach(id=>{
    const p=DB.products.find(x=>x.id===id);
    if(p && p.qty>0 && !used.has(p.id)){
      if(!isPM && p.active) return;                          // never actives in the morning
      if(steps.some(s=>!s.groom && s.p.cat===p.cat)) return; // category already covered
      add(p, null, ["you picked this"]);
    }
  });

  if(noseWax) noseWaxStep();   // nose wax is always the very last thing

  // Redundancy guard: if a category is already covered, set aside in-stock
  // duplicates so you don't overuse the same *kind* of product.
  const usedByCat={};
  steps.forEach(s=>{ if(!s.groom) (usedByCat[s.p.cat]=usedByCat[s.p.cat]||[]).push(s.p); });
  inStock(p=>true).forEach(p=>{
    if(used.has(p.id) || p.active) return;
    const chosen = usedByCat[p.cat];
    if(chosen && chosen.length && !skips.some(s=>s.p.id===p.id)){
      const lc=catInfo(p.cat).label.toLowerCase();
      skips.push({p, why:`Extra ${lc} — using ${chosen[0].brand} ${chosen[0].name} tonight. Rotating your ${lc}s so none gets overused.`});
    }
  });

  steps.forEach((s,i)=>s.n=i+1);
  _excl = null;
  return {steps, skips};
}
// Rough time estimate for the built routine.
function estimateMinutes(steps){
  let m=0;
  steps.forEach(s=>{
    if(s.shave) m+=GROOM_MIN.shave;
    else if(s.noseWax) m+=GROOM_MIN.noseWax;
    else if(s.dryBrush) m+=GROOM_MIN.dryBrush;
    else if(s.p.cat==="mask") m+=12;
    else if(s.p.cat==="sheet_mask") m+=18;
    else if(s.p.cat==="cleanser") m+=1.5;
    else m+=1;
  });
  return Math.max(1, Math.round(m));
}

/* Consecutive-day streak ending today; grace if today not yet logged. */
function dayKey(ts){ const d=new Date(ts); return d.getFullYear()+"-"+d.getMonth()+"-"+d.getDate(); }
function currentStreak(){
  const days = new Set(DB.log.filter(e=>e.products && e.products.length).map(e=>dayKey(e.ts)));
  if(!days.size) return 0;
  let streak=0;
  const d = new Date();
  if(!days.has(dayKey(d.getTime()))) d.setDate(d.getDate()-1); // today un-logged → start from yesterday
  while(days.has(dayKey(d.getTime()))){ streak++; d.setDate(d.getDate()-1); }
  return streak;
}

/* Forward-simulate which active lands on each of the next 7 nights. */
function weeklyActivesPlan(){
  const actives = inStock(p=>p.active);
  if(!actives.length) return [];
  const last={}, uses={};
  actives.forEach(a=>{
    last[a.id]=a.lastUsed;
    uses[a.id]=DB.log.filter(e=>e.products.includes(a.id)).map(e=>e.ts);
  });
  const base = new Date(); base.setHours(21,0,0,0);
  const plan=[];
  for(let i=0;i<7;i++){
    const nightTs = base.getTime() + i*DAY;
    const avail = actives.filter(a=>{
      const ds = last[a.id]==null ? Infinity : Math.floor((nightTs-last[a.id])/DAY);
      const cnt = uses[a.id].filter(ts=>nightTs-ts < 7*DAY && nightTs-ts >= 0).length;
      return ds>=a.cd && (!a.max || cnt<a.max);
    }).sort((x,y)=>{
      const dx = last[x.id]==null ? Infinity : nightTs-last[x.id];
      const dy = last[y.id]==null ? Infinity : nightTs-last[y.id];
      return dy-dx;
    });
    const chosen = avail[0] || null;
    plan.push({nightTs, active:chosen});
    if(chosen){ last[chosen.id]=nightTs; uses[chosen.id].push(nightTs); }
  }
  return plan;
}

// Which venue a step happens at (only shown when the shower is included).
// Grooming (shave/nose wax/dry brush) is dry and done first — at the sink.
function stepVenue(s){
  if(s.groom) return "sink";
  return (s.p.cat==="cleanser" || s.p.cat==="mask") ? "shower" : "sink";
}
// Grooming cadence helpers.
function lastGroomTs(kind){ const e=DB.log.filter(x=>x[kind]).sort((a,b)=>b.ts-a.ts)[0]; return e?e.ts:null; }
function groomDaysAgo(kind){ const t=lastGroomTs(kind); return t?daysSince(t):Infinity; }
function groomDue(kind){ return groomDaysAgo(kind) >= CADENCE[kind]; }
function renderRitual(){
  const out=$("#ritualOut"); if(!out) return;
  [...picks].forEach(id=>{ if(!DB.products.some(p=>p.id===id && p.qty>0)) picks.delete(id); }); // prune stale picks
  const R=resolveTier(); const shower=!!R.shower;
  const {steps,skips}=buildRoutine(R.mode, {scope:R.scope, shave:includeShave, noseWax:includeNoseWax, dryBrush:includeDryBrush, picks:[...picks], exclude:excluded});
  // reflect "due" state on the grooming toggles
  [["shave","#shaveTog",includeShave],["noseWax","#noseTog",includeNoseWax],["dryBrush","#dryTog",includeDryBrush]]
    .forEach(([k,sel,on])=>{ const el=$(sel); if(el) el.classList.toggle("due", !on && groomDue(k)); });
  if(!steps.length){ out.innerHTML=`<div class="empty">Nothing in stock for this ritual. Add products on the Shelf tab.</div>`; return; }

  const mins=estimateMinutes(steps);
  let html = DB.trip ? `<div class="tripbanner">✈️ Building from your Dopp kit · ${DB.trip.kit.length} item${DB.trip.kit.length===1?"":"s"}</div>` : "";
  html += `<div class="ritualest">≈ ${mins} min · ${steps.length} step${steps.length===1?"":"s"}${includeShave?" · 🪒 shave":""}${includeNoseWax?" · 👃 nose wax":""}${includeDryBrush?" · 🖌️ dry brush":""} · ${shower?"🚿 shower + 🚰 sink":"🚰 sink"}</div>`;

  // Cadence recommendations: grooming that's due but not toggled on.
  const recs=[["shave",includeShave],["noseWax",includeNoseWax],["dryBrush",includeDryBrush]]
    .filter(([k,on])=>!on && groomDue(k)).map(([k])=>({k, d:groomDaysAgo(k)}));
  if(recs.length){
    html += `<div class="recbar">Due today: ` + recs.map(r=>
      `<button class="recpill" data-groomrec="${r.k}">${GROOM_LABEL[r.k]}${r.d!==Infinity?` · ${r.d}d ago`:" · new"}</button>`).join(" ") + `</div>`;
  }
  if(includeNoseWax){
    const d=groomDaysAgo('noseWax');
    if(d<CADENCE.noseWax) html += `<div class="stepnote" style="background:rgba(185,138,62,.12);padding:10px 12px;border-radius:10px;margin-bottom:12px">⚠️ Last nose wax was ${d} day${d===1?"":"s"} ago — recommended every 3 weeks (${CADENCE.noseWax-d} to go).</div>`;
  }
  html += steps.map(s=>{
    const metaItems = s.groom ? s.meta : [catInfo(s.p.cat).label, ...s.meta];
    const meta = metaItems.map(m=>`<span>${esc(m)}</span>`).join("");
    const who = s.groom ? `<span style="color:var(--accent);font-weight:600">Grooming step</span>` : `<b>${esc(s.p.brand)}</b> · ${esc(s.p.name)}`;
    const vb = shower ? `<span class="venue ${stepVenue(s)}">${stepVenue(s)==="shower"?"🚿 Shower":"🚰 Sink"}</span>` : "";
    const rm = (!s.groom && s.p.id>0) ? `<button class="stepx" data-remove="${s.p.id}" title="Remove from tonight">✕</button>` : "";
    return `<div class="step">
      <div class="stepn">${s.n}</div>
      <div style="flex:1;min-width:0">
        <div class="verb">${esc(s.verb)}${vb}</div>
        <div class="who">${who}</div>
        <div class="how">${esc(s.how)}</div>
        ${s.p.note?`<div class="stepnote">⚠️ ${esc(s.p.note)}</div>`:""}
        <div class="metarow">${meta}</div>
      </div>${rm}
    </div>`;
  }).join("");

  const protips={
    morning:"Mornings are about protection. Keep it simple and finish with SPF. Save every active for the evening.",
    refresh:"A midday reset — freshen, hydrate, and go. No actives now; SPF only if you're headed back into the sun.",
    evening:"Evenings are about repair. Oil-cleanse off the day, one active at most, and let each layer absorb."
  };
  html += `<div class="protip"><div class="t">Pro tip</div><div class="b">${protips[period]}</div></div>`;

  // Combined "add to tonight" menu: everything on the shelf NOT already in the
  // ritual, grouped by category, with any skip reason. Tap to include.
  const inRitual = new Set(steps.filter(s=>s.p.id>0).map(s=>s.p.id));
  const skipWhy = {}; skips.forEach(s=>{ if(!(s.p.id in skipWhy)) skipWhy[s.p.id]=s.why; });
  const notIn = inStock(p=>!inRitual.has(p.id));
  html += `<div class="addmenu"><h3>Add to tonight</h3>`;
  if(!notIn.length){
    html += `<div class="amsub">Everything on your shelf is already in tonight's ritual.</div>`;
  } else {
    html += `<div class="amsub">On your shelf but not in tonight's ritual — tap a section to expand.</div>`;
    const byCat={}; notIn.forEach(p=>{ (byCat[p.cat]=byCat[p.cat]||[]).push(p); });
    Object.keys(byCat).sort((a,b)=>(STEP_OF[a]??9)-(STEP_OF[b]??9)).forEach(cat=>{
      const items = byCat[cat].sort((a,b)=>a.name.localeCompare(b.name)).map(p=>
        `<button class="amitem" data-add="${p.id}"><span class="amadd">＋</span>`
        + `<div class="amn"><b>${esc(p.brand)}</b> · ${esc(p.name)}</div>`
        + (skipWhy[p.id]?`<div class="amwhy">${esc(skipWhy[p.id])}</div>`:"")
        + `</button>`
      ).join("");
      html += `<details class="amgroup" data-cat="${esc(cat)}"${openCats.has(cat)?" open":""}>`
        + `<summary>${catInfo(cat).emoji} ${esc(catInfo(cat).label)} <span class="amcount">${byCat[cat].length}</span></summary>${items}</details>`;
    });
  }
  html += `</div>`;

  const ids=steps.filter(s=>s.p.id>0).map(s=>s.p.id);
  const extra=[includeShave?"shave":"", includeNoseWax?"nose wax":"", includeDryBrush?"dry brush":""].filter(Boolean).join(" + ");
  const periodWord={morning:"morning",refresh:"refresh",evening:"evening"}[period];
  html += `<button class="btn ghost" id="logBtn" style="margin-top:16px">✓ Log this ${periodWord}${extra?" + "+extra:""}</button>`;
  out.innerHTML=html;
  $("#logBtn").onclick=()=>logRoutine(ids, includeShave, includeNoseWax, includeDryBrush, R.mode);
  out.querySelectorAll("[data-groomrec]").forEach(b=>b.onclick=()=>{
    const k=b.dataset.groomrec;
    if(k==="shave"){ includeShave=true; $("#shaveTog").classList.add("on"); }
    else if(k==="noseWax"){ includeNoseWax=true; $("#noseTog").classList.add("on"); }
    else if(k==="dryBrush"){ includeDryBrush=true; $("#dryTog").classList.add("on"); }
    renderRitual();
  });
  out.querySelectorAll("details.amgroup").forEach(d=>d.addEventListener("toggle",()=>{ d.open?openCats.add(d.dataset.cat):openCats.delete(d.dataset.cat); }));
  out.querySelectorAll("[data-add]").forEach(b=>b.onclick=()=>{
    const id=+b.dataset.add, p=DB.products.find(x=>x.id===id);
    excluded.delete(id);                               // re-adding cancels a prior removal
    if(p){ [...picks].forEach(pid=>{ const pp=DB.products.find(x=>x.id===pid); if(pp && pp.cat===p.cat) picks.delete(pid); }); picks.add(id); }
    renderRitual();
  });
  out.querySelectorAll("[data-remove]").forEach(b=>b.onclick=()=>{ const id=+b.dataset.remove; excluded.add(id); picks.delete(id); renderRitual(); });
}
function logRoutine(ids, shave, noseWax, dryBrush, logMode){
  const now=Date.now();
  DB.log.push({ts:now, mode:logMode||"pm", products:ids.slice(), shave:!!shave, noseWax:!!noseWax, dryBrush:!!dryBrush, travel:!!DB.trip});
  ids.forEach(id=>{ const p=DB.products.find(x=>x.id===id); if(p) p.lastUsed=now; });
  excluded=new Set(); picks=new Set();   // reset tonight's tweaks after logging
  save(); buzz(15); refreshStreak(); showRecap(ids, shave, noseWax, dryBrush);
}

function renderRhythm(){
  const n=currentStreak();
  const week=DB.log.filter(e=>e.products && e.products.length && (Date.now()-e.ts)<7*DAY).length;

  // grooming rows with cadence status
  const cadTxt = k => CADENCE[k]>=21 ? "every ~3 weeks" : CADENCE[k]<=1 ? "up to daily" : `every ~${CADENCE[k]} days`;
  const groomRow = (k, label) => {
    const ago=groomDaysAgo(k);
    const last = ago===Infinity?"not logged yet":ago===0?"today":ago===1?"yesterday":`${ago}d ago`;
    const pill = ago>=CADENCE[k] ? `<span class="statuspill ready">Due now</span>`
      : `<span class="statuspill wait">In ${CADENCE[k]-ago}d</span>`;
    return `<div class="sched"><div><div class="nm">${label}</div><div class="br">${cadTxt(k)} · last ${last}</div></div>${pill}</div>`;
  };

  // active scheduling status
  const actives=inStock(p=>p.active);
  const schedRows = actives.map(p=>{
    let pill;
    if(activeAvailable(p)) pill=`<span class="statuspill ready">Ready tonight</span>`;
    else if(p.max && usesInLast7(p.id)>=p.max) pill=`<span class="statuspill wait">Weekly max hit</span>`;
    else { const d=Math.max(0,p.cd-daysSince(p.lastUsed)); pill=`<span class="statuspill wait">In ${d}d</span>`; }
    return `<div class="sched"><div><div class="nm">${esc(p.name)}</div><div class="br">${esc(p.brand)}</div></div>${pill}</div>`;
  }).join("") || `<div class="empty" style="padding:14px">No actives on your shelf.</div>`;

  // 7-night forecast
  const plan=weeklyActivesPlan();
  const wk=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  const planRows = plan.length ? plan.map((d,i)=>{
    const dt=new Date(d.nightTs);
    const label = i===0 ? "Tonight" : wk[dt.getDay()];
    const body = d.active
      ? `${esc(d.active.name)}`
      : `<span class="rest">Hydrate & recover — no active</span>`;
    return `<div class="night ${i===0?"today":""}"><div class="day">${label}</div><div class="plan ${d.active?"":"rest"}">${body}</div></div>`;
  }).join("") : `<div class="empty" style="padding:14px">Add an active to see a schedule.</div>`;

  $("#rhythmOut").innerHTML=`
    <div class="hero">
      <div class="big">${n>0?"🔥 "+n:"✨"}</div>
      <div class="lab">${n>0?`day streak — keep it glowing`:"Log a ritual to start your streak"}</div>
    </div>
    <div class="panel"><h3>Actives — smart scheduling</h3>${schedRows}</div>
    <div class="panel"><h3>Next 7 nights</h3><div class="week7">${planRows}</div></div>
    <div class="panel"><h3>This week</h3>
      <div style="font-size:14px">You've logged <b>${week}</b> ritual${week===1?"":"s"} in the last 7 days.</div>
    </div>
    <div class="panel"><h3>Grooming</h3>
      ${groomRow("shave","🪒 Shave")}
      ${groomRow("noseWax","👃 Nose wax")}
      ${groomRow("dryBrush","🖌️ Dry brush")}
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:12px">
        <button class="btn ghost" id="logShaveBtn" style="flex:1;min-width:110px">🪒 Log shave</button>
        <button class="btn ghost" id="logNoseBtn" style="flex:1;min-width:110px">👃 Log nose wax</button>
        <button class="btn ghost" id="logDryBtn" style="flex:1;min-width:110px">🖌️ Log dry brush</button>
      </div>
    </div>
    <div class="panel" id="calWrap"></div>
    <div class="panel"><h3>Backup &amp; data</h3>
      <div style="font-size:13.5px;margin-bottom:12px">Everything lives on this device only. Export a file now and then so a browser reset can't erase your history.</div>
      ${backupOverdue()?`<div class="stepnote" style="background:rgba(185,138,62,.12);padding:10px 12px;border-radius:10px;margin-bottom:12px">⚠️ ${DB.lastBackupTs?`Last backup ${esc(lastBackupText())} — time for a fresh one.`:"You haven't backed up yet."}</div>`:`<div style="font-size:12px;color:var(--muted);margin-bottom:12px">Last backup: ${esc(lastBackupText())}</div>`}
      <div style="display:flex;gap:8px">
        <button class="btn ghost" id="exportBtn" style="flex:1">⬇︎ Export backup</button>
        <label class="btn ghost" style="flex:1;cursor:pointer;margin:0">⬆︎ Import<input id="importFile" type="file" accept="application/json,.json" style="display:none"></label>
      </div>
      <div style="text-align:center;font-size:11px;color:var(--muted);opacity:.7;margin-top:14px">skinritual · ${esc(APP_VERSION)}</div>
    </div>`;
  $("#logShaveBtn").onclick=logShaveNow;
  $("#logNoseBtn").onclick=logNoseWaxNow;
  $("#logDryBtn").onclick=logDryBrushNow;
  $("#exportBtn").onclick=exportBackup;

/* Calendar of logged rituals — tap a day to see what was used. */
let calY=null, calM=null, calSel=null;
function renderCalendar(){
  const wrap=$("#calWrap"); if(!wrap) return;
  const now=new Date();
  if(calY===null){ calY=now.getFullYear(); calM=now.getMonth(); }

  const byDay={};
  DB.log.forEach(e=>{ (byDay[dayKey(e.ts)]=byDay[dayKey(e.ts)]||[]).push(e); });

  const first=new Date(calY,calM,1);
  const startDow=first.getDay();
  const daysInMonth=new Date(calY,calM+1,0).getDate();
  const monthName=first.toLocaleDateString(undefined,{month:"long",year:"numeric"});
  const todayKey=dayKey(now.getTime());

  let cells="";
  for(let i=0;i<startDow;i++) cells+=`<div class="calday empty"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const dk=calY+"-"+calM+"-"+d;
    const entries=byDay[dk]||[];
    const hasAM=entries.some(e=>e.mode==="am" && e.products && e.products.length);
    const hasPM=entries.some(e=>e.mode==="pm" && e.products && e.products.length);
    const hasRe=entries.some(e=>e.mode==="refresh" && e.products && e.products.length);
    const mk=(hasAM?"☀️":"")+(hasRe?"🔆":"")+(hasPM?"🌙":"")+(entries.some(e=>e.shave)?"🪒":"")+(entries.some(e=>e.noseWax)?"👃":"")+(entries.some(e=>e.dryBrush)?"🖌️":"")+(entries.some(e=>e.travel)?"✈️":"");
    const cls=["calday"];
    if(entries.length) cls.push("has");
    if(dk===todayKey) cls.push("today");
    if(dk===calSel) cls.push("sel");
    cells+=`<button class="${cls.join(" ")}" data-day="${dk}"><span class="cn">${d}</span>${mk?`<span class="cmk">${mk}</span>`:""}</button>`;
  }

  let detail="";
  if(calSel){
    const entries=(byDay[calSel]||[]).slice().sort((a,b)=>a.ts-b.ts);
    const [yy,mm,dd]=calSel.split("-").map(Number);
    const dateLabel=new Date(yy,mm,dd).toLocaleDateString(undefined,{weekday:"long",month:"long",day:"numeric"});
    detail=`<div class="caldetail"><div class="cd-date">${esc(dateLabel)}</div>`+
      (entries.length ? entries.map(e=>{
        const t=new Date(e.ts).toLocaleTimeString(undefined,{hour:"numeric",minute:"2-digit"});
        const hasProds = e.products && e.products.length;
        const del=`<button class="cd-del" data-del="${e.ts}" title="Delete this entry">✕</button>`;
        if(!hasProds){
          const g=[e.shave?"🪒 Shave":"", e.noseWax?"👃 Nose wax":"", e.dryBrush?"🖌️ Dry brush":""].filter(Boolean).join(" + ") || "Logged";
          return `<div class="cd-entry"><div class="cd-mode">${esc(g)} · ${esc(t)}${del}</div></div>`;
        }
        const head=(e.shave?"🪒 ":"")+(e.noseWax?"👃 ":"")+(e.dryBrush?"🖌️ ":"")+(e.mode==="am"?"☀️ Morning":e.mode==="refresh"?"🔆 Refresh":"🌙 Evening")+" · "+t;
        const prods=(e.products||[]).map(id=>{const p=meta(id);return `<li>${esc(p.brand)} · ${esc(p.name)}</li>`;}).join("");
        return `<div class="cd-entry"><div class="cd-mode">${esc(head)}${del}</div><ul>${prods}</ul></div>`;
      }).join("") : `<div class="cd-none">Nothing logged this day.</div>`)
      +`<div class="cd-add">Add to this day: <button class="cd-addbtn" data-add="shave">🪒 Shave</button> <button class="cd-addbtn" data-add="noseWax">👃 Nose wax</button> <button class="cd-addbtn" data-add="dryBrush">🖌️ Dry brush</button></div></div>`;
  }

  wrap.innerHTML=`
    <div class="calhead">
      <button class="calnav" id="calPrev" aria-label="Previous month">‹</button>
      <div class="caltitle">${esc(monthName)}</div>
      <button class="calnav" id="calNext" aria-label="Next month">›</button>
    </div>
    <div class="calgrid caldow"><span>S</span><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span></div>
    <div class="calgrid">${cells}</div>
    ${detail}`;
  $("#calPrev").onclick=()=>{ calM--; if(calM<0){calM=11;calY--;} calSel=null; renderCalendar(); };
  $("#calNext").onclick=()=>{ calM++; if(calM>11){calM=0;calY++;} calSel=null; renderCalendar(); };
  wrap.querySelectorAll(".calday[data-day]").forEach(b=>b.onclick=()=>{ calSel=(calSel===b.dataset.day?null:b.dataset.day); renderCalendar(); });
  wrap.querySelectorAll("[data-del]").forEach(b=>b.onclick=()=>delLogEntry(+b.dataset.del));
  wrap.querySelectorAll("[data-add]").forEach(b=>b.onclick=()=>addRetroGroom(calSel, b.dataset.add));
}
function delLogEntry(ts){
  const e=DB.log.find(x=>x.ts===ts); if(!e) return;
  const label = !e.products.length ? (e.shave?"shave":e.noseWax?"nose wax":e.dryBrush?"dry brush":"grooming") : "ritual";
  if(!confirm(`Delete this ${label} entry?`)) return;
  DB.log=DB.log.filter(x=>x.ts!==ts);
  save(); buzz(15); refreshStreak(); toast("Entry deleted"); renderRhythm();
}
function addRetroGroom(dayK, kind){
  if(!dayK) return;
  const [yy,mm,dd]=dayK.split("-").map(Number);
  let ts=new Date(yy,mm,dd,12,0,0).getTime();
  while(DB.log.some(e=>e.ts===ts)) ts++;                 // keep timestamps unique
  const entry={ts, mode:"pm", products:[]};
  entry[kind]=true;
  DB.log.push(entry);
  save(); buzz(15); toast(GROOM_LABEL[kind]?GROOM_LABEL[kind]+" added":"Added"); renderRhythm();
}

function productToPref(p){

function stopScan(){
  if(scanTimer){ clearInterval(scanTimer); scanTimer=null; }
  if(zxingReader){ try{zxingReader.reset();}catch(e){} zxingReader=null; }
  if(scanStream){ try{scanStream.getTracks().forEach(t=>t.stop());}catch(e){} scanStream=null; }
}
function loadScript(src){ return new Promise((res,rej)=>{ const s=document.createElement("script"); s.src=src; s.onload=res; s.onerror=rej; document.head.appendChild(s); }); }

function showCap(m){
  capMode=m; stopScan();
  $$("#capModes button").forEach(b=>b.classList.toggle("on", b.dataset.cap===m));
  if(m==="scan") capScan();
  else if(m==="manual") capManual();
  else capAI();
}
function capScan(){
  $("#capBody").innerHTML=`
    <p class="hint">Point your camera at the product barcode. We read it and check the open product databases (Open Beauty &amp; Food Facts) to pre-fill the form. If it's not found, tap AI Photo or enter it manually. No account needed.</p>
    <div id="scanBox"></div>
    <div class="hint" id="scanStatus" style="text-align:center;min-height:20px"></div>`;
  startScan();
}
async function startScan(){
  const status=$("#scanStatus"), box=$("#scanBox");
  const toManual=(txt)=>{ status.innerHTML=`${esc(txt)} <a href="#" id="toManual">Enter manually →</a>`;
    const a=$("#toManual"); if(a) a.onclick=e=>{e.preventDefault();showCap("manual");}; };
  const secure = window.isSecureContext || location.hostname==="localhost" || location.hostname==="127.0.0.1";
  if(!secure){ toManual("Camera needs a secure (https) connection."); return; }

  box.innerHTML="";
  const video=document.createElement("video");
  video.setAttribute("playsinline","true"); video.muted=true;
  video.style.cssText="width:100%;border-radius:14px;background:#000;aspect-ratio:4/3;object-fit:cover";
  box.appendChild(video);
  const onCode=code=>{ if(!code) return; buzz(20); stopScan(); lookupBarcode(String(code).trim()); };

  // Preferred: native BarcodeDetector (fast, reliable for UPC/EAN on iOS 17+/Android Chrome)
  if("BarcodeDetector" in window){
    try{
      const supported=await BarcodeDetector.getSupportedFormats();
      const want=["ean_13","ean_8","upc_a","upc_e","code_128","code_39","itf","codabar"].filter(f=>supported.includes(f));
      const det=new BarcodeDetector(want.length?{formats:want}:undefined);
      scanStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:"environment"}}});
      video.srcObject=scanStream; await video.play().catch(()=>{});
      status.textContent="Point at the barcode…";
      scanTimer=setInterval(async()=>{
        try{ const codes=await det.detect(video); if(codes&&codes.length) onCode(codes[0].rawValue); }catch(e){}
      },300);
      return;
    }catch(e){ stopScan(); box.innerHTML=""; box.appendChild(video); }
  }
  // Fallback: ZXing (robust multi-format engine) loaded lazily from CDN
  status.textContent="Loading scanner…";
  try{
    if(!window.ZXing) await loadScript("https://unpkg.com/@zxing/library@0.21.3/umd/index.min.js");
    zxingReader=new ZXing.BrowserMultiFormatReader();
    status.textContent="Point at the barcode…";
    await zxingReader.decodeFromConstraints({video:{facingMode:{ideal:"environment"}}}, video,
      (result)=>{ if(result) onCode(result.getText()); });
  }catch(e){ toManual("Couldn't start the camera. Check camera permission, or"); }
}

// Guess a category from product text so the manual form pre-selects it.
function guessCat(text){
  const t=(text||"").toLowerCase();
  const rules=[
    ["sunscreen",["spf","sunscreen","sun fluid","uv "]],
    ["retinol",["retinol","retinal"]],
    ["exfoliant",["exfoliant","peel","aha","bha","glycolic","salicylic","lactic"]],
    ["sheet_mask",["sheet mask","mask sheet"]],
    ["mask",["mask","masque"]],
    ["eye_cream",["eye cream","under eye","eye concentrate"]],
    ["night_cream",["night cream","overnight","sleeping"]],
    ["serum",["serum","ampoule","essence"]],
    ["toner",["toner","mist","tonic"]],
    ["spot",["spot treatment","pimple","blemish","acne patch","hydrocolloid"]],
    ["cleanser",["cleanser","cleansing","face wash","cleansing oil","foam"]],
    ["moisturizer",["moisturizer","moisturiser","lotion","cream","hydrat"]],
  ];
  for(const [cat,keys] of rules){ if(keys.some(k=>t.includes(k))) return cat; }
  return "";
}
// Chain of keyless sources: retailer aggregate → beauty DB → food DB.
async function lookupSources(code){
  try{ // 1. UPCitemdb trial — aggregates Amazon/Walmart/etc. listings (keyless, rate-limited)
    const r=await fetch(`https://api.upcitemdb.com/prod/trial/lookup?upc=${encodeURIComponent(code)}`);
    if(r.ok){ const j=await r.json(); const it=j.items&&j.items[0];
      if(it&&it.title) return {name:it.title, brand:it.brand||"", cat:guessCat(it.title+" "+(it.category||"")), via:"retailer data"}; }
  }catch(e){}
  try{ // 2. Open Beauty Facts
    const r=await fetch(`https://world.openbeautyfacts.org/api/v2/product/${encodeURIComponent(code)}.json`);
    const j=await r.json();
    if(j.status===1&&j.product){ const p=j.product;
      return {name:p.product_name||p.generic_name||"", brand:(p.brands||"").split(",")[0].trim(), cat:guessCat((p.product_name||"")+" "+(p.categories||"")), via:"Open Beauty Facts"}; }
  }catch(e){}
  try{ // 3. Open Food Facts (some cosmetics are catalogued here)
    const r=await fetch(`https://world.openfoodfacts.org/api/v2/product/${encodeURIComponent(code)}.json`);
    const j=await r.json();
    if(j.status===1&&j.product){ const p=j.product;
      return {name:p.product_name||"", brand:(p.brands||"").split(",")[0].trim(), cat:guessCat((p.product_name||"")+" "+(p.categories||"")), via:"Open Food Facts"}; }
  }catch(e){}
  return null;
}
async function lookupBarcode(code){
  const status=$("#scanStatus"); status.textContent=`Looking up ${code}…`;
  let hit=null; try{ hit=await lookupSources(code); }catch(e){}
  if(hit&&hit.name){
    showCap("manual");
    if($("#mName")) $("#mName").value=hit.name;
    if($("#mBrand")) $("#mBrand").value=hit.brand||"";
    if(hit.cat&&CATS[hit.cat]&&$("#mCat")) $("#mCat").value=hit.cat;
    toast(hit.via?`Found via ${hit.via} — review & save`:"Found — review & save");
    return;
  }
  status.innerHTML=`Barcode <b>${esc(code)}</b> isn't in the free databases (common for K-beauty).<br>
    <a href="#" id="toAI" style="font-weight:700">📷 Identify with AI Photo →</a><br>
    <a href="#" id="toManual3">Enter it manually →</a> <a href="#" id="rescan" style="margin-left:10px">Rescan</a>`;
  if($("#toAI")) $("#toAI").onclick=e=>{e.preventDefault();showCap("ai");};
  if($("#toManual3")) $("#toManual3").onclick=e=>{e.preventDefault();showCap("manual");};
  if($("#rescan")) $("#rescan").onclick=e=>{e.preventDefault();capScan();};
}

function saveProduct(editId){
  const name=$("#mName").value.trim(), brand=$("#mBrand").value.trim();
  if(!name){ toast("Add a product name"); return; }
  const cat=$("#mCat").value, when=$("#mWhen").value, freq=$("#mFreq").value, isActive=$("#mActive").checked;
  const sizeMl=parseSize($("#mSize")?$("#mSize").value:"");
  const fields={
    name, brand:brand||"—", cat,
    am:when==="pm"?0:1, pm:when==="am"?0:1,
    freq, step:STEP_OF[cat]??3,
    cd:isActive?2:0, max:isActive?4:0,
    active:isActive?1:0,
    hydra:(cat==="serum"&&!isActive)?1:0,
    sizeMl, tsa:(($("#mTsa")&&$("#mTsa").checked) || (sizeMl!=null && sizeMl<=TSA.maxMl))?1:0,
  };
  if(editId){
    const p=DB.products.find(x=>x.id===editId);
    if(p) Object.assign(p, fields);   // keep id, qty, lastUsed
    toast("Saved changes");
  } else {
    const id=Math.max(0,...DB.products.map(p=>p.id),0)+1;
    DB.products.push({id, ...fields, qty:1, lastUsed:null});
    if(DB.trip){ DB.trip.kit.push(id); DB.trip.packed.push(id); toast(`Added to your Dopp kit ✈️`); }
    else toast(`Added ${name}`);
  }
  save(); closeAdd(); renderChips(); renderShelf();
}
function capAI(){
  const savedKey=localStorage.getItem("skinritual-aikey")||"";
  if(!savedKey){

// Sensible AM/PM + frequency defaults from category (label rarely states these).
function whenFor(cat){ if(cat==="sunscreen")return "am"; if(["night_cream","retinol","exfoliant","spot","mask","sheet_mask"].includes(cat))return "pm"; return "both"; }
function freqFor(cat){ return ({retinol:"3-4x/week",exfoliant:"2-3x/week",mask:"Weekly",sheet_mask:"As desired",spot:"As needed"})[cat]||"Daily"; }
function fileToB64(f){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=rej;r.readAsDataURL(f);});}

const AI_PROMPT = `You are a skincare expert helping someone who does NOT know how to use their products. Identify this product from the photo, then — using the label's directions PLUS general dermatology knowledge — determine exactly how it should be used and how it interacts with other actives. Respond with ONLY a JSON object, no prose:
{
 "name": string,
 "brand": string,
 "cat": one of "cleanser","toner","serum","eye_cream","moisturizer","night_cream","sunscreen","exfoliant","spot","mask","sheet_mask","retinol",
 "am": boolean,           // use in the morning?
 "pm": boolean,           // use in the evening?
 "freq": one of "Daily","Twice daily","2-3x/week","3-4x/week","Weekly","As needed","As desired",
 "active": boolean,       // true for retinoids / AHAs / BHAs / strong exfoliants that must be spaced out
 "cooldownDays": number,  // minimum days between uses (0 if safe to use daily)
 "maxPerWeek": number,    // max uses per 7 days (0 = no limit)
 "verb": string,          // 1-2 word action label, e.g. "Retinol","Cleanse","Hydrate","SPF"
 "how": string,           // one concise sentence on how to apply it correctly

 "soothing": boolean,     // true if gentle/calming/barrier-repair/fragrance-free — good on freshly-shaved or irritated skin
 "sizeMl": number,        // net container size in mL if printed ("50 mL" or "1.7 fl oz"→50); 0 if unreadable
 "form": "liquid"|"solid"|"aerosol"   // liquid=cream/gel/lotion/serum; solid=sheet mask/stick/powder/patch; aerosol=spray can
}`;

// Coerce the AI JSON into a safe, complete product profile.
function normalizeProfile(p){
  const FREQS=["Daily","Twice daily","2-3x/week","3-4x/week","Weekly","As needed","As desired"];
  const cat = CATS[p.cat] ? p.cat : (guessCat((p.name||"")+" "+(p.cat||"")) || "serum");
  const active = !!p.active || cat==="retinol" || cat==="exfoliant";
  let am=p.am, pm=p.pm;
  if(am===undefined && pm===undefined){ const w=whenFor(cat); am=(w!=="pm"); pm=(w!=="am"); }
  am=!!am; pm=!!pm; if(!am && !pm) pm=true;
  const freq = FREQS.includes(p.freq) ? p.freq : freqFor(cat);
  const cd  = Number.isFinite(p.cooldownDays) ? Math.max(0,Math.round(p.cooldownDays)) : (active?2:0);
  const max = Number.isFinite(p.maxPerWeek)   ? Math.max(0,Math.round(p.maxPerWeek))   : (active?(cat==="retinol"?4:3):0);
  return {
    name:(p.name||"").trim()||"Product", brand:(p.brand||"").trim()||"—",
    cat, am:am?1:0, pm:pm?1:0, freq, active:active?1:0,
    cd, max, step:STEP_OF[cat]??3,
    verb:(p.verb||"").trim(), how:(p.how||"").trim(), note:(p.note||"").trim(),
    soothing:p.soothing?1:0,
    sizeMl:(Number.isFinite(p.sizeMl)&&p.sizeMl>=1&&p.sizeMl<=1000)?Math.round(p.sizeMl):null,
    form:["liquid","solid","aerosol"].includes(p.form)?p.form:null,
    tsa:(p.form==="solid" || (Number.isFinite(p.sizeMl)&&p.sizeMl>0&&p.sizeMl<=100))?1:0,
    hydra:(cat==="serum"&&!active)?1:0,
  };
}

async function runAI(file){
  const key=localStorage.getItem("skinritual-aikey")||"";
  const out=$("#aiOut"), prev=$("#aiPreview");
  if(!key){ capAI(); return; }
  if(!file){ return; }
  try{ const url=URL.createObjectURL(file); if(prev) prev.innerHTML=`<img src="${url}" style="width:100%;max-height:200px;object-fit:contain;border-radius:12px">`; }catch(e){}
  if(out) out.textContent="Reading the label…";
  try{
    const b64=await fileToB64(file);
    const mime=file.type||"image/jpeg";
    const body={
      model:"claude-sonnet-5", max_tokens:700,
      messages:[{role:"user",content:[
        {type:"image",source:{type:"base64",media_type:mime,data:b64}},
        {type:"text",text:AI_PROMPT}
      ]}]
    };

      method:"POST",
      headers:{"content-type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify(body)
    });
    const j=await r.json();
    const text=(j.content&&j.content[0]&&j.content[0].text)||"";
    const m=text.replace(/```json|```/g,"").match(/\{[\s\S]*\}/);
    if(!m) throw new Error("no json");
    const p=JSON.parse(m[0]);
    if(!p.name && !p.brand) throw new Error("blank");
    showAIResult(normalizeProfile(p));

    if(prev) prev.innerHTML="";
    if(out) out.innerHTML=`Couldn't read that clearly. <a href="#" id="aiRetry">Try another photo →</a> · <a href="#" id="aiToManual">Enter manually →</a>`;

    if($("#aiToManual")) $("#aiToManual").onclick=ev=>{ev.preventDefault();showCap("manual");};
  }
}

async function forceUpdate(){

      const regs=await navigator.serviceWorker.getRegistrations();
      await Promise.all(regs.map(r=>r.unregister()));
    }
    if(window.caches){ const keys=await caches.keys(); await Promise.all(keys.map(k=>caches.delete(k))); }
