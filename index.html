<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#FAF8F5" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<title>skinritual</title>
<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" href="icon.svg" type="image/svg+xml" />
<link rel="apple-touch-icon" href="icon-192.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500;1,600&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#FAF8F5; --text:#26190E; --accent:#8C6444; --muted:#A07850;
    --card:#fff; --line:rgba(140,100,68,.16); --line-strong:rgba(140,100,68,.3);
    --pill-fg:rgba(38,25,14,.74);
    --ok:#6f8f5f; --warn:#b98a3e;
    --shadow:0 1px 8px rgba(38,25,14,.07);
    --shadow-lg:0 8px 30px rgba(38,25,14,.15);
    --r-card:14px; --r-btn:12px; --r-pill:20px;
    --serif:'Cormorant Garamond',Georgia,serif;
    --sans:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    --gutter:16px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg); color:var(--text); font-family:var(--sans);
    font-size:15px; line-height:1.45; -webkit-font-smoothing:antialiased;
    padding-bottom:calc(88px + env(safe-area-inset-bottom));
    touch-action:manipulation; overflow-x:hidden;
  }
  .wrap{max-width:640px;margin:0 auto;padding:0 var(--gutter)}
  button{font-family:var(--sans)}

  /* ---------- Header ---------- */
  header.app{
    position:sticky; top:0; z-index:40; background:rgba(250,248,245,.9);
    backdrop-filter:saturate(1.4) blur(12px); -webkit-backdrop-filter:saturate(1.4) blur(12px);
    border-bottom:1px solid var(--line);
    padding-top:calc(10px + env(safe-area-inset-top));
  }
  .hrow{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
  .logo{font-family:var(--serif);font-size:31px;font-weight:500;letter-spacing:.3px;line-height:1;padding:6px 0 3px}
  .logo b{font-weight:500}
  .logo i{font-style:italic;color:var(--accent)}
  .tagline{font-size:11px;color:var(--muted);letter-spacing:.7px;text-transform:uppercase;margin-bottom:11px}
  .htools{display:flex;align-items:center;gap:8px;padding-top:8px}
  .streakchip{display:flex;align-items:center;gap:5px;background:rgba(140,100,68,.1);color:var(--accent);font-weight:700;font-size:13px;padding:6px 12px;border-radius:var(--r-pill);white-space:nowrap}
  .streakchip.zero{opacity:.5}
  .updbtn{width:36px;height:36px;border-radius:50%;border:1px solid var(--line);background:var(--card);color:var(--muted);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex:none}
  .updbtn:active{transform:rotate(180deg);transition:transform .3s}

  /* ---------- Bottom nav ---------- */
  nav.tabs{
    position:fixed;left:0;right:0;bottom:0;z-index:50;
    background:rgba(255,255,255,.95);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    border-top:1px solid var(--line);
    display:flex;justify-content:space-around;
    padding:8px 6px calc(8px + env(safe-area-inset-bottom));
  }
  nav.tabs button{
    flex:1;background:none;border:none;color:var(--muted);
    font-size:11px;font-weight:600;letter-spacing:.3px;
    display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;
    padding:5px 0;border-radius:10px;transition:color .15s,transform .1s;
  }
  nav.tabs button .ic{font-size:20px;line-height:1}
  nav.tabs button.on{color:var(--accent)}
  nav.tabs button:active{transform:scale(.94)}

  /* ---------- Views ---------- */
  section.view{display:none;padding-top:16px}
  section.view.on{display:block;animation:fade .25s ease}
  @keyframes fade{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
  h2.head{font-family:var(--serif);font-size:27px;font-weight:600;margin:2px 0}
  .sub{color:var(--muted);font-size:13px;margin-bottom:15px}
  #shelfCount{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .linkbtn{background:none;border:none;color:var(--muted);font-family:var(--sans);font-size:12.5px;font-weight:600;text-decoration:underline;cursor:pointer;padding:2px 2px;flex:none}

  /* ---------- Controls ---------- */
  .controls{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
  .search{flex:1;min-width:150px;position:relative}
  .search::before{content:"⌕";position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:16px}
  .search input{
    width:100%;padding:11px 12px 11px 34px;border:1px solid var(--line);
    border-radius:var(--r-btn);background:var(--card);font-family:var(--sans);
    font-size:14px;color:var(--text);
  }
  .search input:focus{outline:none;border-color:var(--line-strong)}
  .chips{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .chips::-webkit-scrollbar{display:none}
  .chip{white-space:nowrap;border:1px solid var(--line);background:var(--card);color:var(--muted);
    font-size:12.5px;font-weight:600;padding:6px 13px;border-radius:var(--r-pill);cursor:pointer;flex:none}
  .chip.on{background:var(--accent);color:#fff;border-color:var(--accent)}

  /* ---------- Product grid ---------- */
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .card{background:var(--card);border-radius:var(--r-card);box-shadow:var(--shadow);
    padding:12px;position:relative;display:flex;flex-direction:column;gap:8px;overflow:hidden}
  .tile{height:74px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:34px}
  .brand{font-size:10.5px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--muted)}
  .pname{font-family:var(--serif);font-size:18px;font-weight:600;line-height:1.12;margin:-2px 0 0}
  .tagrow{display:flex;flex-wrap:wrap;gap:5px;margin-top:auto}
  .pill{font-size:10.5px;font-weight:600;padding:3px 8px;border-radius:var(--r-pill);color:var(--pill-fg)}
  .tg{font-size:10.5px;font-weight:600;padding:3px 7px;border-radius:var(--r-pill);background:rgba(140,100,68,.08);color:var(--muted)}
  .qty{display:flex;align-items:center;justify-content:space-between;gap:6px;margin-top:2px}
  .qbtns{display:flex;align-items:center;gap:8px}
  .qbtn{width:30px;height:30px;border-radius:9px;border:1px solid var(--line);background:var(--bg);color:var(--accent);
    font-size:18px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .qn{min-width:18px;text-align:center;font-weight:700;font-size:15px}
  .rm{background:none;border:none;color:var(--muted);opacity:.55;font-size:15px;cursor:pointer;padding:4px}
  .lowbadge{position:absolute;top:10px;right:10px;background:var(--warn);color:#fff;font-size:9.5px;font-weight:700;
    letter-spacing:.4px;padding:3px 7px;border-radius:var(--r-pill);text-transform:uppercase;z-index:2}
  .oos{position:absolute;inset:0;background:rgba(250,248,245,.82);backdrop-filter:blur(1px);
    display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;z-index:3;border-radius:var(--r-card)}
  .oos .lab{font-weight:700;color:var(--muted);font-size:12.5px;letter-spacing:.4px;text-transform:uppercase}
  .oos button{border:1px solid var(--line);background:var(--card);color:var(--accent);font-weight:600;
    font-size:12.5px;padding:6px 14px;border-radius:var(--r-pill);cursor:pointer}

  /* ---------- Buttons ---------- */
  .btn{display:block;width:100%;text-align:center;border:none;border-radius:var(--r-btn);
    padding:14px;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:.2px}
  .btn.primary{background:var(--accent);color:#fff;box-shadow:var(--shadow)}
  .btn.primary:active{transform:translateY(1px)}
  .btn.ghost{background:var(--card);color:var(--accent);border:1px solid var(--line)}

  /* ---------- Segmented toggle ---------- */
  .segwrap{display:flex;background:rgba(140,100,68,.09);border-radius:var(--r-btn);padding:4px;margin-bottom:12px}
  .segwrap button{flex:1;border:none;background:none;color:var(--muted);font-weight:700;font-size:14px;
    padding:10px;border-radius:9px;cursor:pointer;transition:.15s}
  .segwrap button.on{background:var(--card);color:var(--text);box-shadow:var(--shadow)}
  .anchor{margin-bottom:14px}
  .anchor label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:600}
  select.f,select#anchorSel{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:var(--r-btn);
    background:var(--card);font-family:var(--sans);font-size:14px;color:var(--text);appearance:none}

  /* ---------- Routine steps ---------- */
  .step{background:var(--card);border-radius:var(--r-card);box-shadow:var(--shadow);padding:15px 15px 15px 14px;
    margin-bottom:11px;display:flex;gap:13px}
  .stepn{flex:none;width:30px;height:30px;border-radius:50%;background:rgba(140,100,68,.12);color:var(--accent);
    font-weight:700;font-size:14px;display:flex;align-items:center;justify-content:center;margin-top:2px}
  .step .verb{font-family:var(--serif);font-size:20px;font-weight:600;line-height:1.1}
  .step .who{font-size:12.5px;color:var(--muted);margin:2px 0 6px}
  .step .who b{color:var(--text);font-weight:600}
  .step .how{font-size:13.5px;line-height:1.4}
  .step .metarow{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
  .step .metarow span{font-size:10.5px;font-weight:600;color:var(--muted);background:rgba(140,100,68,.08);
    padding:3px 8px;border-radius:var(--r-pill)}
  .protip{background:linear-gradient(180deg,#fff,#fbf6ef);border:1px solid var(--line);border-radius:var(--r-card);
    padding:15px;margin-top:6px}
  .protip .t{font-family:var(--serif);font-size:18px;font-weight:600;margin-bottom:4px}
  .protip .b{font-size:13.5px;color:var(--muted);line-height:1.45}
  .skipwrap{margin-top:16px}
  .skipwrap h3{font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:0 0 8px}
  .skip{background:rgba(140,100,68,.05);border-radius:11px;padding:11px 13px;margin-bottom:8px}
  .skip .n{font-weight:600;font-size:13.5px}
  .skip .w{font-size:12.5px;color:var(--muted);margin-top:2px}

  /* ---------- Rhythm ---------- */
  .hero{background:var(--card);border-radius:var(--r-card);box-shadow:var(--shadow);padding:22px;text-align:center;margin-bottom:16px}
  .hero .big{font-family:var(--serif);font-size:54px;font-weight:600;line-height:1}
  .hero .lab{font-size:13px;color:var(--muted);margin-top:4px}
  .panel{background:var(--card);border-radius:var(--r-card);box-shadow:var(--shadow);padding:16px;margin-bottom:16px}
  .panel h3{font-family:var(--serif);font-size:19px;font-weight:600;margin:0 0 12px}
  .sched{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:9px 0;border-top:1px solid var(--line)}
  .sched:first-of-type{border-top:none}
  .sched .nm{font-size:13.5px;font-weight:600}
  .sched .br{font-size:11px;color:var(--muted)}
  .statuspill{font-size:11px;font-weight:700;padding:4px 10px;border-radius:var(--r-pill);white-space:nowrap;flex:none}
  .statuspill.ready{background:rgba(111,143,95,.16);color:var(--ok)}
  .statuspill.wait{background:rgba(185,138,62,.16);color:var(--warn)}
  .week7{display:flex;flex-direction:column;gap:7px}
  .night{display:flex;align-items:center;gap:11px}
  .night .day{flex:none;width:64px;font-size:12px;font-weight:700;color:var(--muted)}
  .night .plan{flex:1;background:rgba(140,100,68,.06);border-radius:9px;padding:8px 11px;font-size:13px}
  .night.today .plan{background:rgba(140,100,68,.13);font-weight:600}
  .night .plan.rest{color:var(--muted)}
  .logitem{display:flex;align-items:center;gap:11px;padding:10px 0;border-top:1px solid var(--line)}
  .logitem:first-of-type{border-top:none}
  .logitem .when{font-size:13px;font-weight:600}
  .logitem .sub2{font-size:11.5px;color:var(--muted)}
  .dots{display:flex;gap:3px;margin-left:auto;flex-wrap:wrap;max-width:120px;justify-content:flex-end}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--accent);opacity:.5}
  .empty{text-align:center;color:var(--muted);font-size:14px;padding:34px 16px;line-height:1.5}

  /* ---------- Calendar ---------- */
  .calhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .caltitle{font-family:var(--serif);font-size:19px;font-weight:600}
  .calnav{width:32px;height:32px;border-radius:9px;border:1px solid var(--line);background:var(--card);color:var(--accent);font-size:18px;line-height:1;cursor:pointer}
  .calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
  .caldow{margin-bottom:5px}
  .caldow span{text-align:center;font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.3px}
  .calday{aspect-ratio:1;border:none;background:rgba(140,100,68,.05);border-radius:9px;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:1px;cursor:pointer;color:var(--text);padding:0;position:relative}
  .calday.empty{background:none;cursor:default}
  .calday .cn{font-size:12.5px;font-weight:600}
  .calday .cmk{font-size:8px;line-height:1}
  .calday.has{background:rgba(140,100,68,.16)}
  .calday.today{outline:2px solid var(--accent);outline-offset:-2px}
  .calday.sel{background:var(--accent);color:#fff}
  .caldetail{margin-top:14px;border-top:1px solid var(--line);padding-top:12px}
  .cd-date{font-family:var(--serif);font-size:17px;font-weight:600;margin-bottom:8px}
  .cd-entry{margin-bottom:10px}
  .cd-mode{font-size:12.5px;font-weight:700;color:var(--accent);margin-bottom:3px}
  .cd-entry ul{margin:0;padding-left:18px}
  .cd-entry li{font-size:13px;line-height:1.5}
  .cd-none{font-size:13px;color:var(--muted)}

  /* ---------- FAB ---------- */
  .fab{position:fixed;right:calc(var(--gutter) + max(0px, (100vw - 640px)/2));
    bottom:calc(92px + env(safe-area-inset-bottom));z-index:45;
    background:var(--accent);color:#fff;border:none;border-radius:var(--r-pill);
    padding:14px 20px;font-size:14px;font-weight:700;box-shadow:var(--shadow-lg);cursor:pointer}
  .fab:active{transform:translateY(1px)}

  /* ---------- Modal / sheet ---------- */
  .modal{position:fixed;inset:0;z-index:100;display:none;align-items:flex-end;justify-content:center;
    background:rgba(38,25,14,.42)}
  .modal.on{display:flex;animation:fade .2s ease}
  .sheet{background:var(--bg);width:100%;max-width:640px;border-radius:22px 22px 0 0;
    padding:8px var(--gutter) calc(24px + env(safe-area-inset-bottom));max-height:92vh;overflow-y:auto;
    animation:rise .28s cubic-bezier(.2,.8,.2,1)}
  @keyframes rise{from{transform:translateY(30px)}to{transform:none}}
  .grab{width:38px;height:4px;border-radius:3px;background:var(--line-strong);margin:8px auto 12px}
  .sheet .sh-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .sheet .sh-head h3{font-family:var(--serif);font-size:22px;font-weight:600;margin:0}
  .xbtn{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;line-height:1}
  .modes{display:flex;gap:7px;margin-bottom:14px}
  .modes button{flex:1;border:1px solid var(--line);background:var(--card);color:var(--muted);
    font-weight:600;font-size:13px;padding:9px;border-radius:var(--r-btn);cursor:pointer}
  .modes button.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .field{margin-bottom:12px}
  .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;font-weight:600}
  .field .f{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:var(--r-btn);
    background:var(--card);font-family:var(--sans);font-size:14px;color:var(--text)}
  .field .f:focus{outline:none;border-color:var(--line-strong)}
  .checkrow{display:flex;align-items:flex-start;gap:9px;font-size:13px;line-height:1.4;margin-bottom:14px;color:var(--text)}
  .checkrow input{width:18px;height:18px;margin-top:1px;flex:none;accent-color:var(--accent)}
  #scanBox{border-radius:var(--r-card);overflow:hidden;margin-bottom:10px}
  .hint{font-size:12px;color:var(--muted);line-height:1.45;margin:-4px 0 12px}
  .hint a{color:var(--accent)}

  /* ---------- Toast ---------- */
  .toast{position:fixed;left:50%;bottom:calc(100px + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(20px);
    background:var(--text);color:#fff;padding:10px 18px;border-radius:var(--r-pill);font-size:13.5px;font-weight:600;
    z-index:200;opacity:0;pointer-events:none;transition:.25s;white-space:nowrap;box-shadow:var(--shadow-lg)}
  .toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

  /* ---------- Recap ---------- */
  .recap{position:fixed;inset:0;z-index:150;display:none;align-items:center;justify-content:center;
    background:rgba(38,25,14,.5);padding:24px}
  .recap.on{display:flex;animation:fade .25s ease}
  .recapcard{background:var(--card);border-radius:22px;padding:28px 24px;max-width:360px;width:100%;text-align:center;
    box-shadow:var(--shadow-lg);animation:pop .3s cubic-bezier(.2,.9,.3,1.2)}
  @keyframes pop{from{transform:scale(.9);opacity:0}to{transform:none;opacity:1}}
  .recapcard .fire{font-size:56px;line-height:1}
  .recapcard .rtitle{font-family:var(--serif);font-size:26px;font-weight:600;margin:6px 0 2px}
  .recapcard .rsub{font-size:13px;color:var(--muted);margin-bottom:18px}
  .rstats{display:flex;justify-content:center;gap:0;margin-bottom:18px}
  .rstat{flex:1}
  .rstat .v{font-family:var(--serif);font-size:26px;font-weight:600}
  .rstat .k{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
  .rsteps{text-align:left;background:rgba(140,100,68,.05);border-radius:12px;padding:12px 14px;margin-bottom:18px;
    font-size:13px;line-height:1.7;max-height:200px;overflow-y:auto}
  .rsteps .s{color:var(--text)}
  .rsteps .s b{color:var(--muted);font-weight:600}

  .bootskel{padding:60px 20px;text-align:center;color:var(--muted);font-size:14px}
  .appfoot{text-align:center;color:var(--muted);font-size:11px;letter-spacing:.4px;opacity:.65;padding:22px 0 6px}
</style>
</head>
<body>

<header class="app">
  <div class="wrap">
    <div class="hrow">
      <div>
        <div class="logo"><b>skin</b><i>ritual</i></div>
        <div class="tagline">your shelf, your ritual</div>
      </div>
      <div class="htools">
        <div class="streakchip zero" id="streakChip" title="Daily ritual streak">🔥 <span id="streakN">0</span></div>
        <button class="updbtn" id="updBtn" title="Update to newest version" aria-label="Update">⟳</button>
      </div>
    </div>
  </div>
</header>

<main class="wrap" id="app">
  <div class="bootskel" id="boot">loading your shelf…</div>

  <!-- SHELF -->
  <section class="view" id="view-shelf">
    <h2 class="head">Your Shelf</h2>
    <div class="sub" id="shelfCount">—</div>
    <div class="controls">
      <div class="search"><input id="searchIn" placeholder="Search name or brand…" aria-label="Search" /></div>
    </div>
    <div class="chips" id="filterChips"></div>
    <div id="shelfGrid" class="grid" style="margin-top:12px"></div>
  </section>

  <!-- RITUAL -->
  <section class="view" id="view-ritual">
    <h2 class="head">Tonight's Ritual</h2>
    <div class="sub">Built from what's on your shelf, in the right order.</div>
    <div class="segwrap" id="ritualSeg">
      <button data-mode="am" class="on">☀️ Morning</button>
      <button data-mode="pm">🌙 Evening</button>
    </div>
    <div class="anchor">
      <label>Tonight I want to use… (optional)</label>
      <select id="anchorSel"><option value="">No anchor — build my standard ritual</option></select>
    </div>
    <button class="btn primary" id="buildBtn">Get My Ritual →</button>
    <div id="ritualOut" style="margin-top:16px"></div>
  </section>

  <!-- RHYTHM -->
  <section class="view" id="view-rhythm">
    <h2 class="head">Your Rhythm</h2>
    <div class="sub">Streak, active scheduling, and history.</div>
    <div id="rhythmOut"></div>
  </section>

<script>
"use strict";
/* ============================================================
   skinritual — single-file PWA. No build step, no backend.
   All product data hardcoded; state persists in localStorage.
   ============================================================ */

const $  = (s,r=document)=>r.querySelector(s);
const $$ = (s,r=document)=>[...r.querySelectorAll(s)];
const DAY = 86400000;
const APP_VERSION = "v12";               // shown in footer; keep in sync with sw.js CACHE
const KEY = "skinritual-v2";            // storage key — DO NOT change (would wipe shelves)
const esc = s => String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

/* ---------- Categories (key → label, pastel pill, emoji) ---------- */
const CATS = {
  cleanser:   {label:"Cleanser",    pill:"#e7dccd", emoji:"🫧"},
  toner:      {label:"Toner",       pill:"#dfe8de", emoji:"💧"},
  serum:      {label:"Serum",       pill:"#e3ddef", emoji:"🧪"},
  eye_cream:  {label:"Eye Cream",   pill:"#f0e2d9", emoji:"👁️"},
  moisturizer:{label:"Moisturizer", pill:"#f3e9d9", emoji:"🌸"},
  night_cream:{label:"Night Cream", pill:"#dde1ef", emoji:"🌙"},
  sunscreen:  {label:"SPF",         pill:"#fdeecb", emoji:"☀️"},
  exfoliant:  {label:"Exfoliant",   pill:"#f2dede", emoji:"✨"},
  spot:       {label:"Spot Treat",  pill:"#f4dcd0", emoji:"🎯"},
  mask:       {label:"Mask",        pill:"#e3ded4", emoji:"🎭"},
  sheet_mask: {label:"Sheet Mask",  pill:"#e8e0ec", emoji:"🍃"},
  retinol:    {label:"Retinol",     pill:"#efdbd0", emoji:"🌀"},
};
const catInfo = c => CATS[c] || {label:c, pill:"#eee", emoji:"🧴"};

/* Category → step bucket. 0 = mask/sheet (special, anchor-only). */
const STEP_OF = {cleanser:1,toner:2,serum:3,retinol:3,exfoliant:3,spot:3,eye_cream:4,
  moisturizer:5,night_cream:5,sunscreen:6,mask:0,sheet_mask:0};

/* ---------- Per-category how-to: [verb, sentence] ---------- */
const CAT_HOWTO = {
  cleanser:["Cleanse","Work into a soft foam on damp skin, rinse."],
  toner:["Tone","Sweep or mist over skin to rebalance and prep."],
  serum:["Treat","Press a few drops evenly into skin."],
  eye_cream:["Eye cream","Tap a rice-grain amount around the orbital bone."],
  moisturizer:["Moisturize","Smooth an even layer over face and neck."],
  night_cream:["Night cream","Massage a nourishing layer in as your last step."],
  sunscreen:["SPF","Two fingers' worth, last step. Wait 2–3 min before sun/makeup."],
  exfoliant:["Exfoliate","Apply to dry skin, PM only. Avoid the eye area."],
  retinol:["Retinol","Pea-size on dry skin. PM only, never with a strong exfoliant."],
  spot:["Spot treat","Dab a thin layer only on the blemish."],
  mask:["Mask","Apply an even layer, leave on, then rinse."],
  sheet_mask:["Sheet mask","Lay onto clean skin 15–20 min, then pat in the essence."],
};
const howtoFor = p => CAT_HOWTO[p.cat] || [catInfo(p.cat).label,"Apply as directed."];

/* ============================================================
   State
   ============================================================ */
let DB = {ver:2, products:[], log:[]};
let mode = "am";     // ritual mode
let filter = "All";  // shelf category filter
let query = "";

function freshDB(){ return {ver:2, products:[], log:[]}; }
function load(){
  try{
    const raw = localStorage.getItem(KEY);
    if(!raw){ DB = freshDB(); save(); return; }
    const parsed = JSON.parse(raw);
    DB = {ver:parsed.ver||2, products:parsed.products||[], log:parsed.log||[]};
  }catch(e){ DB = freshDB(); }
}
function save(){ try{ localStorage.setItem(KEY, JSON.stringify(DB)); }catch(e){} }

/* ============================================================
   Pure logic (testable)
   ============================================================ */
function daysSince(ts){ return ts ? Math.floor((Date.now()-ts)/DAY) : Infinity; }
function usesInLast7(id, atTs=Date.now()){
  return DB.log.filter(e => (atTs - e.ts) < 7*DAY && (atTs - e.ts) >= 0 && e.products.includes(id)).length;
}
function inStock(pred){ return DB.products.filter(p => p.qty>0 && pred(p)); }
function pick(pred, rank){ let c = inStock(pred); if(rank) c = c.slice().sort(rank); return c[0]; }
function activeAvailable(p){
  if(daysSince(p.lastUsed) < p.cd) return false;       // cooldown not elapsed
  if(p.max && usesInLast7(p.id) >= p.max) return false; // weekly cap hit
  return true;
}
const preferFav   = (a,b)=>(b.fav?1:0)-(a.fav?1:0);
const preferLight = (a,b)=>(b.light?1:0)-(a.light?1:0);
const preferMedicube = (a,b)=>(a.brand==="Medicube"?-1:0)-(b.brand==="Medicube"?-1:0);

/* Build an ordered routine. Returns {steps:[{p,verb,how,meta:[]}], skips:[{p,why}]}. */
function buildRoutine(routineMode, anchorId){
  const steps=[], skips=[], used=new Set();
  const add=(p, override, meta)=>{
    if(!p || used.has(p.id)) return;
    used.add(p.id);
    const [v,h] = override || howtoFor(p);
    steps.push({p, verb:v, how:h, meta:meta||[]});
  };
  const anchor = anchorId ? DB.products.find(p=>p.id===anchorId && p.qty>0) : null;

  if(routineMode==="am"){
    // AM — no actives, ever.
    add(pick(p=>p.am && p.cat==="cleanser", preferFav));
    add(pick(p=>p.am && p.cat==="toner", preferMedicube));
    inStock(p=>p.am && p.hydra).sort((a,b)=>a.id-b.id).forEach(p=>add(p));
    add(pick(p=>p.am && p.cat==="eye_cream"));
    add(pick(p=>p.am && p.cat==="moisturizer", preferLight));
    add(pick(p=>p.am && p.cat==="sunscreen", preferFav), null, ["always last · wait 2–3 min"]);
    inStock(p=>p.active).forEach(p=>skips.push({p, why:"No actives in the morning — actives are PM only."}));
    if(anchor && anchor.pm && !anchor.am)
      skips.push({p:anchor, why:"This is an evening product — switch to the Evening ritual to use it."});
  } else {
    const anchorIsMask = anchor && (anchor.cat==="mask" || anchor.cat==="sheet_mask");
    if(anchorIsMask){
      // Clog-night flow: double cleanse → featured mask → tone → hydrate → eye → night.
      add(pick(p=>p.oil), ["Oil cleanse","Prep skin so the mask can work — massage on dry skin, rinse."]);
      add(pick(p=>p.cat==="cleanser" && !p.oil, preferFav));
      const [av,ah] = howtoFor(anchor);
      add(anchor, [anchor.cat==="mask"?"Mask (anchor)":"Sheet mask (anchor)", ah], ["featured tonight"]);
      add(pick(p=>p.pm && p.cat==="toner", preferMedicube));
      inStock(p=>p.pm && p.hydra).sort((a,b)=>a.id-b.id).forEach(p=>add(p));
      add(pick(p=>p.pm && p.cat==="eye_cream"));
      add(pick(p=>p.cat==="night_cream") || pick(p=>p.pm && p.cat==="moisturizer", preferLight));
    } else {
      add(pick(p=>p.oil));                                    // 1 oil cleanse
      add(pick(p=>p.cat==="cleanser" && !p.oil, preferFav));  // 2 second cleanse
      add(pick(p=>p.pm && p.cat==="toner", preferMedicube));  // 3 toner

      // 4 active step — anchor forces the pick, else most-overdue available
      let active = null;
      if(anchor && anchor.active){ active = anchor; }
      else {
        active = inStock(p=>p.active && activeAvailable(p))
          .sort((a,b)=>daysSince(b.lastUsed)-daysSince(a.lastUsed))[0] || null;
      }
      if(active){
        const m=[]; if(active.max) m.push(`max ${active.max}×/week`);
        m.push(active.cat==="retinol" ? "retinol night" : "exfoliation night");
        add(active, null, m);
        inStock(p=>p.active && p.id!==active.id).forEach(p=>{
          const clash = (active.cat==="retinol" && p.cat==="exfoliant") || (active.cat==="exfoliant" && p.cat==="retinol");
          skips.push({p, why: clash
            ? "Don't layer with tonight's active — alternate on separate nights."
            : "One active per night is plenty."});
        });
      } else {
        inStock(p=>p.active).forEach(p=>{
          const dLeft = Math.max(0, p.cd - daysSince(p.lastUsed));
          const capped = p.max && usesInLast7(p.id) >= p.max;
          skips.push({p, why: capped
            ? `Weekly limit reached (${p.max?`max ${p.max}×/week`:p.freq}).`
            : `On cooldown — available in ${dLeft} day${dLeft===1?"":"s"}.`});
        });
      }

      inStock(p=>p.pm && p.hydra).sort((a,b)=>a.id-b.id).forEach(p=>add(p)); // 5 hydrating serums
      if(anchor && anchor.cat==="spot") add(anchor);                          // spot if anchored
      add(pick(p=>p.pm && p.cat==="eye_cream"));                              // 6 eye
      add(pick(p=>p.cat==="night_cream") || pick(p=>p.pm && p.cat==="moisturizer", preferLight)); // 7 night
    }
  }
  steps.forEach((s,i)=>s.n=i+1);
  return {steps, skips};
}

/* Consecutive-day streak ending today; grace if today not yet logged. */
function dayKey(ts){ const d=new Date(ts); return d.getFullYear()+"-"+d.getMonth()+"-"+d.getDate(); }
function currentStreak(){
  if(!DB.log.length) return 0;
  const days = new Set(DB.log.map(e=>dayKey(e.ts)));
  let streak=0;
  const d = new Date();
  if(!days.has(dayKey(d.getTime()))) d.setDate(d.getDate()-1); // today un-logged → start from yesterday
  while(days.has(dayKey(d.getTime()))){ streak++; d.setDate(d.getDate()-1); }
  return streak;
}

/* Forward-simulate which active lands on each of the next 7 nights. */
function weeklyActivesPlan(){
  const actives = inStock(p=>p.active);
  if(!actives.length) return [];
  const last={}, uses={};
  actives.forEach(a=>{
    last[a.id]=a.lastUsed;
    uses[a.id]=DB.log.filter(e=>e.products.includes(a.id)).map(e=>e.ts);
  });
  const base = new Date(); base.setHours(21,0,0,0);
  const plan=[];
  for(let i=0;i<7;i++){
    const nightTs = base.getTime() + i*DAY;
    const avail = actives.filter(a=>{
      const ds = last[a.id]==null ? Infinity : Math.floor((nightTs-last[a.id])/DAY);
      const cnt = uses[a.id].filter(ts=>nightTs-ts < 7*DAY && nightTs-ts >= 0).length;
      return ds>=a.cd && (!a.max || cnt<a.max);
    }).sort((x,y)=>{
      const dx = last[x.id]==null ? Infinity : nightTs-last[x.id];
      const dy = last[y.id]==null ? Infinity : nightTs-last[y.id];
      return dy-dx;
    });
    const chosen = avail[0] || null;
    plan.push({nightTs, active:chosen});
    if(chosen){ last[chosen.id]=nightTs; uses[chosen.id].push(nightTs); }
  }
  return plan;
}

/* ============================================================
   UI helpers
   ============================================================ */
function toast(msg){ const t=$("#toast"); t.textContent=msg; t.classList.add("on"); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove("on"),3000); }
function buzz(ms){ try{ if(navigator.vibrate) navigator.vibrate(ms||15); }catch(e){} }
function refreshStreak(){
  const n=currentStreak(), chip=$("#streakChip");
  $("#streakN").textContent=n;
  chip.classList.toggle("zero", n===0);
}

/* ============================================================
   Shelf
   ============================================================ */
function renderChips(){
  const present=[...new Set(DB.products.map(p=>p.cat))];
  const cats=["All", ...present];
  $("#filterChips").innerHTML = cats.map(c=>{
    const label = c==="All" ? "All" : catInfo(c).emoji+" "+catInfo(c).label;
    return `<button class="chip ${c===filter?"on":""}" data-cat="${esc(c)}">${esc(label)}</button>`;
  }).join("");
  $$(".chip").forEach(b=>b.onclick=()=>{ filter=b.dataset.cat; renderChips(); renderShelf(); });
}
function renderShelf(){
  const total=DB.products.length, stock=DB.products.filter(p=>p.qty>0).length;
  $("#shelfCount").innerHTML = `<span>${total} product${total===1?"":"s"} · ${stock} in stock</span>`
    + (total?`<button class="linkbtn" id="clearShelf">Clear all</button>`:"");
  if($("#clearShelf")) $("#clearShelf").onclick=clearShelf;

  const grid=$("#shelfGrid");
  if(!total){
    grid.innerHTML=`<div class="empty" style="grid-column:1/-1">Your shelf is empty.<br>Tap the ＋ button to add your first product.</div>`;
    return;
  }

  const q=query.trim().toLowerCase();
  const list=DB.products.filter(p=>{
    if(filter!=="All" && p.cat!==filter) return false;
    if(q && !(p.name.toLowerCase().includes(q)||p.brand.toLowerCase().includes(q))) return false;
    return true;
  });
  if(!list.length){ grid.innerHTML=`<div class="empty" style="grid-column:1/-1">No products match. Try clearing the search or filter.</div>`; return; }
  grid.innerHTML = list.map(p=>{
    const ci=catInfo(p.cat), out=p.qty<=0, low=p.qty===1;
    const tags=[];
    if(p.am) tags.push(`<span class="tg">☀️ AM</span>`);
    if(p.pm) tags.push(`<span class="tg">🌙 PM</span>`);
    if(p.freq && p.freq!=="Daily") tags.push(`<span class="tg">${esc(p.freq)}</span>`);
    return `<div class="card" data-id="${p.id}">
      ${low&&!out?`<span class="lowbadge">Low</span>`:""}
      <div class="tile" style="background:${ci.pill}">${ci.emoji}</div>
      <div class="brand">${esc(p.brand)}</div>
      <div class="pname">${esc(p.name)}</div>
      <div class="tagrow">
        <span class="pill" style="background:${ci.pill}">${esc(ci.label)}</span>
        ${tags.join("")}
      </div>
      <div class="qty">
        <div class="qbtns">
          <button class="qbtn" data-act="dec">−</button>
          <span class="qn">${p.qty}</span>
          <button class="qbtn" data-act="inc">+</button>
        </div>
        <button class="rm" data-act="edit" title="Edit">✎</button>
        <button class="rm" data-act="rm" title="Remove">✕</button>
      </div>
      ${out?`<div class="oos"><div class="lab">Out of stock</div><button data-act="inc">Restock +1</button></div>`:""}
    </div>`;
  }).join("");
  $$("#shelfGrid .card").forEach(card=>{
    const id=+card.dataset.id;
    card.querySelectorAll("[data-act]").forEach(btn=>{
      btn.onclick=e=>{
        e.stopPropagation();
        const a=btn.dataset.act;
        if(a==="inc") chgQty(id,1);
        else if(a==="dec") chgQty(id,-1);
        else if(a==="rm") removeProd(id);
        else if(a==="edit") openEdit(id);
      };
    });
  });
}
function clearShelf(){
  if(confirm("Clear your entire shelf? This removes all products (your streak and history stay).")){
    DB.products=[]; save(); renderChips(); renderShelf(); fillAnchor(); toast("Shelf cleared");
  }
}
function chgQty(id,d){ const p=DB.products.find(x=>x.id===id); if(!p) return; p.qty=Math.max(0,p.qty+d); save(); renderShelf(); }
function removeProd(id){
  const p=DB.products.find(x=>x.id===id); if(!p) return;
  if(confirm(`Remove ${p.name} from your shelf?`)){
    DB.products=DB.products.filter(x=>x.id!==id); save(); renderShelf(); toast("Removed"); fillAnchor();
  }
}

/* ============================================================
   Ritual
   ============================================================ */
function fillAnchor(){
  const sel=$("#anchorSel"), cur=sel.value;
  const opts=inStock(p=>true).sort((a,b)=>a.name.localeCompare(b.name))
    .map(p=>`<option value="${p.id}">${esc(p.brand)} · ${esc(p.name)}</option>`).join("");
  sel.innerHTML=`<option value="">No anchor — build my standard ritual</option>`+opts;
  if(cur && DB.products.some(p=>p.id===+cur && p.qty>0)) sel.value=cur;
}
function renderRitual(){
  const anchorId=+$("#anchorSel").value||null;
  const {steps,skips}=buildRoutine(mode, anchorId);
  const out=$("#ritualOut");
  if(!steps.length){ out.innerHTML=`<div class="empty">Nothing in stock for this ritual. Restock on the Shelf tab.</div>`; return; }
  let html = steps.map(s=>{
    const ci=catInfo(s.p.cat);
    const meta=[`<span>${esc(ci.label)}</span>`, ...s.meta.map(m=>`<span>${esc(m)}</span>`)].join("");
    return `<div class="step">
      <div class="stepn">${s.n}</div>
      <div style="flex:1;min-width:0">
        <div class="verb">${esc(s.verb)}</div>
        <div class="who"><b>${esc(s.p.brand)}</b> · ${esc(s.p.name)}</div>
        <div class="how">${esc(s.how)}</div>
        <div class="metarow">${meta}</div>
      </div>
    </div>`;
  }).join("");

  html += mode==="am"
    ? `<div class="protip"><div class="t">Pro tip</div><div class="b">Mornings are about protection. Keep it simple and finish with SPF — reapply midday if you're outdoors. Save every active for the evening.</div></div>`
    : `<div class="protip"><div class="t">Pro tip</div><div class="b">Evenings are about repair. Oil-cleanse first on dry skin to melt the day off, then one active at most. Let each layer absorb before the next.</div></div>`;

  if(skips.length){
    html += `<div class="skipwrap"><h3>Skipped tonight</h3>` + skips.map(s=>
      `<div class="skip"><div class="n">${esc(s.p.brand)} · ${esc(s.p.name)}</div><div class="w">${esc(s.why)}</div></div>`
    ).join("") + `</div>`;
  }

  const ids=steps.map(s=>s.p.id);
  html += `<button class="btn ghost" id="logBtn" style="margin-top:16px">✓ Log this ${mode==="am"?"morning":"evening"}</button>`;
  out.innerHTML=html;
  $("#logBtn").onclick=()=>logRoutine(ids);
}
function logRoutine(ids){
  const now=Date.now();
  DB.log.push({ts:now, mode, products:ids.slice()});
  ids.forEach(id=>{ const p=DB.products.find(x=>x.id===id); if(p) p.lastUsed=now; });
  save(); buzz(15); refreshStreak(); showRecap(ids);
}

/* ============================================================
   Recap
   ============================================================ */
function showRecap(ids){
  const n=currentStreak();
  const week=DB.log.filter(e=>(Date.now()-e.ts)<7*DAY).length;
  const stepList=ids.map(id=>{ const p=meta(id); return `<div class="s"><b>·</b> ${esc(p.brand)} — ${esc(p.name)}</div>`; }).join("");
  $("#recapCard").innerHTML=`
    <div class="fire">${n>0?"🔥":"✨"}</div>
    <div class="rtitle">Ritual complete</div>
    <div class="rsub">${n>0?`You're on a ${n}-day streak`:"A fresh start — see you tomorrow"}</div>
    <div class="rstats">
      <div class="rstat"><div class="v">${ids.length}</div><div class="k">Steps</div></div>
      <div class="rstat"><div class="v">${n}</div><div class="k">Day streak</div></div>
      <div class="rstat"><div class="v">${week}</div><div class="k">This week</div></div>
    </div>
    <div class="rsteps">${stepList}</div>
    <button class="btn primary" id="recapClose">Done ✓</button>`;
  $("#recap").classList.add("on");
  $("#recapClose").onclick=()=>{ $("#recap").classList.remove("on"); renderRitual(); if($("#view-rhythm").classList.contains("on")) renderRhythm(); };
}
function meta(id){ return DB.products.find(p=>p.id===id) || {brand:"",name:"Product"}; }

/* ============================================================
   Rhythm
   ============================================================ */
function renderRhythm(){
  const n=currentStreak();
  const week=DB.log.filter(e=>(Date.now()-e.ts)<7*DAY).length;

  // active scheduling status
  const actives=inStock(p=>p.active);
  const schedRows = actives.map(p=>{
    let pill;
    if(activeAvailable(p)) pill=`<span class="statuspill ready">Ready tonight</span>`;
    else if(p.max && usesInLast7(p.id)>=p.max) pill=`<span class="statuspill wait">Weekly max hit</span>`;
    else { const d=Math.max(0,p.cd-daysSince(p.lastUsed)); pill=`<span class="statuspill wait">In ${d}d</span>`; }
    return `<div class="sched"><div><div class="nm">${esc(p.name)}</div><div class="br">${esc(p.brand)}</div></div>${pill}</div>`;
  }).join("") || `<div class="empty" style="padding:14px">No actives on your shelf.</div>`;

  // 7-night forecast
  const plan=weeklyActivesPlan();
  const wk=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  const planRows = plan.length ? plan.map((d,i)=>{
    const dt=new Date(d.nightTs);
    const label = i===0 ? "Tonight" : wk[dt.getDay()];
    const body = d.active
      ? `${esc(d.active.name)}`
      : `<span class="rest">Hydrate & recover — no active</span>`;
    return `<div class="night ${i===0?"today":""}"><div class="day">${label}</div><div class="plan ${d.active?"":"rest"}">${body}</div></div>`;
  }).join("") : `<div class="empty" style="padding:14px">Add an active to see a schedule.</div>`;

  $("#rhythmOut").innerHTML=`
    <div class="hero">
      <div class="big">${n>0?"🔥 "+n:"✨"}</div>
      <div class="lab">${n>0?`day streak — keep it glowing`:"Log a ritual to start your streak"}</div>
    </div>
    <div class="panel"><h3>Actives — smart scheduling</h3>${schedRows}</div>
    <div class="panel"><h3>Next 7 nights</h3><div class="week7">${planRows}</div></div>
    <div class="panel"><h3>This week</h3>
      <div style="font-size:14px">You've logged <b>${week}</b> ritual${week===1?"":"s"} in the last 7 days.</div>
    </div>
    <div class="panel" id="calWrap"></div>`;
  renderCalendar();
}

/* Calendar of logged rituals — tap a day to see what was used. */
let calY=null, calM=null, calSel=null;
function renderCalendar(){
  const wrap=$("#calWrap"); if(!wrap) return;
  const now=new Date();
  if(calY===null){ calY=now.getFullYear(); calM=now.getMonth(); }

  const byDay={};
  DB.log.forEach(e=>{ (byDay[dayKey(e.ts)]=byDay[dayKey(e.ts)]||[]).push(e); });

  const first=new Date(calY,calM,1);
  const startDow=first.getDay();
  const daysInMonth=new Date(calY,calM+1,0).getDate();
  const monthName=first.toLocaleDateString(undefined,{month:"long",year:"numeric"});
  const todayKey=dayKey(now.getTime());

  let cells="";
  for(let i=0;i<startDow;i++) cells+=`<div class="calday empty"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const dk=calY+"-"+calM+"-"+d;
    const entries=byDay[dk]||[];
    const mk=(entries.some(e=>e.mode==="am")?"☀️":"")+(entries.some(e=>e.mode==="pm")?"🌙":"");
    const cls=["calday"];
    if(entries.length) cls.push("has");
    if(dk===todayKey) cls.push("today");
    if(dk===calSel) cls.push("sel");
    cells+=`<button class="${cls.join(" ")}" data-day="${dk}"><span class="cn">${d}</span>${mk?`<span class="cmk">${mk}</span>`:""}</button>`;
  }

  let detail="";
  if(calSel){
    const entries=(byDay[calSel]||[]).slice().sort((a,b)=>a.ts-b.ts);
    const [yy,mm,dd]=calSel.split("-").map(Number);
    const dateLabel=new Date(yy,mm,dd).toLocaleDateString(undefined,{weekday:"long",month:"long",day:"numeric"});
    detail=`<div class="caldetail"><div class="cd-date">${esc(dateLabel)}</div>`+
      (entries.length ? entries.map(e=>{
        const t=new Date(e.ts).toLocaleTimeString(undefined,{hour:"numeric",minute:"2-digit"});
        const prods=e.products.map(id=>{const p=meta(id);return `<li>${esc(p.brand)} · ${esc(p.name)}</li>`;}).join("");
        return `<div class="cd-entry"><div class="cd-mode">${e.mode==="am"?"☀️ Morning":"🌙 Evening"} · ${esc(t)}</div><ul>${prods}</ul></div>`;
      }).join("") : `<div class="cd-none">No ritual logged this day.</div>`)+`</div>`;
  }

  wrap.innerHTML=`
    <div class="calhead">
      <button class="calnav" id="calPrev" aria-label="Previous month">‹</button>
      <div class="caltitle">${esc(monthName)}</div>
      <button class="calnav" id="calNext" aria-label="Next month">›</button>
    </div>
    <div class="calgrid caldow"><span>S</span><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span></div>
    <div class="calgrid">${cells}</div>
    ${detail}`;
  $("#calPrev").onclick=()=>{ calM--; if(calM<0){calM=11;calY--;} calSel=null; renderCalendar(); };
  $("#calNext").onclick=()=>{ calM++; if(calM>11){calM=0;calY++;} calSel=null; renderCalendar(); };
  wrap.querySelectorAll(".calday[data-day]").forEach(b=>b.onclick=()=>{ calSel=(calSel===b.dataset.day?null:b.dataset.day); renderCalendar(); });
}

/* ============================================================
   Add product — Scan / Manual / AI
   ============================================================ */
let scanStream=null, scanTimer=null, zxingReader=null, capMode="scan";
function openAdd(){
  $("#addModal").classList.add("on");
  if($("#sheetTitle")) $("#sheetTitle").textContent="Add a Product";
  if($("#capModes")) $("#capModes").style.display="";
  showCap("ai");
}
function openEdit(id){
  const p=DB.products.find(x=>x.id===id); if(!p) return;
  $("#addModal").classList.add("on"); stopScan();
  if($("#sheetTitle")) $("#sheetTitle").textContent="Edit Product";
  if($("#capModes")) $("#capModes").style.display="none";
  capManual(productToPref(p), id);
}
function productToPref(p){
  return {name:p.name, brand:p.brand, cat:p.cat,
    when: p.am&&p.pm?"both":(p.am?"am":"pm"), freq:p.freq, active:!!p.active};
}
function closeAdd(){ $("#addModal").classList.remove("on"); stopScan(); }
function stopScan(){
  if(scanTimer){ clearInterval(scanTimer); scanTimer=null; }
  if(zxingReader){ try{zxingReader.reset();}catch(e){} zxingReader=null; }
  if(scanStream){ try{scanStream.getTracks().forEach(t=>t.stop());}catch(e){} scanStream=null; }
}
function loadScript(src){ return new Promise((res,rej)=>{ const s=document.createElement("script"); s.src=src; s.onload=res; s.onerror=rej; document.head.appendChild(s); }); }

function showCap(m){
  capMode=m; stopScan();
  $$("#capModes button").forEach(b=>b.classList.toggle("on", b.dataset.cap===m));
  if(m==="scan") capScan();
  else if(m==="manual") capManual();
  else capAI();
}
function capScan(){
  $("#capBody").innerHTML=`
    <p class="hint">Point your camera at the product barcode. We read it and check the open product databases (Open Beauty &amp; Food Facts) to pre-fill the form. If it's not found, tap AI Photo or enter it manually. No account needed.</p>
    <div id="scanBox"></div>
    <div class="hint" id="scanStatus" style="text-align:center;min-height:20px"></div>`;
  startScan();
}
async function startScan(){
  const status=$("#scanStatus"), box=$("#scanBox");
  const toManual=(txt)=>{ status.innerHTML=`${esc(txt)} <a href="#" id="toManual">Enter manually →</a>`;
    const a=$("#toManual"); if(a) a.onclick=e=>{e.preventDefault();showCap("manual");}; };
  const secure = window.isSecureContext || location.hostname==="localhost" || location.hostname==="127.0.0.1";
  if(!secure){ toManual("Camera needs a secure (https) connection."); return; }

  box.innerHTML="";
  const video=document.createElement("video");
  video.setAttribute("playsinline","true"); video.muted=true;
  video.style.cssText="width:100%;border-radius:14px;background:#000;aspect-ratio:4/3;object-fit:cover";
  box.appendChild(video);
  const onCode=code=>{ if(!code) return; buzz(20); stopScan(); lookupBarcode(String(code).trim()); };

  // Preferred: native BarcodeDetector (fast, reliable for UPC/EAN on iOS 17+/Android Chrome)
  if("BarcodeDetector" in window){
    try{
      const supported=await BarcodeDetector.getSupportedFormats();
      const want=["ean_13","ean_8","upc_a","upc_e","code_128","code_39","itf","codabar"].filter(f=>supported.includes(f));
      const det=new BarcodeDetector(want.length?{formats:want}:undefined);
      scanStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:"environment"}}});
      video.srcObject=scanStream; await video.play().catch(()=>{});
      status.textContent="Point at the barcode…";
      scanTimer=setInterval(async()=>{
        try{ const codes=await det.detect(video); if(codes&&codes.length) onCode(codes[0].rawValue); }catch(e){}
      },300);
      return;
    }catch(e){ stopScan(); box.innerHTML=""; box.appendChild(video); }
  }
  // Fallback: ZXing (robust multi-format engine) loaded lazily from CDN
  status.textContent="Loading scanner…";
  try{
    if(!window.ZXing) await loadScript("https://unpkg.com/@zxing/library@0.21.3/umd/index.min.js");
    zxingReader=new ZXing.BrowserMultiFormatReader();
    status.textContent="Point at the barcode…";
    await zxingReader.decodeFromConstraints({video:{facingMode:{ideal:"environment"}}}, video,
      (result)=>{ if(result) onCode(result.getText()); });
  }catch(e){ toManual("Couldn't start the camera. Check camera permission, or"); }
}

// Guess a category from product text so the manual form pre-selects it.
function guessCat(text){
  const t=(text||"").toLowerCase();
  const rules=[
    ["sunscreen",["spf","sunscreen","sun fluid","uv "]],
    ["retinol",["retinol","retinal"]],
    ["exfoliant",["exfoliant","peel","aha","bha","glycolic","salicylic","lactic"]],
    ["sheet_mask",["sheet mask","mask sheet"]],
    ["mask",["mask","masque"]],
    ["eye_cream",["eye cream","under eye","eye concentrate"]],
    ["night_cream",["night cream","overnight","sleeping"]],
    ["serum",["serum","ampoule","essence"]],
    ["toner",["toner","mist","tonic"]],
    ["spot",["spot treatment","pimple","blemish","acne patch","hydrocolloid"]],
    ["cleanser",["cleanser","cleansing","face wash","cleansing oil","foam"]],
    ["moisturizer",["moisturizer","moisturiser","lotion","cream","hydrat"]],
  ];
  for(const [cat,keys] of rules){ if(keys.some(k=>t.includes(k))) return cat; }
  return "";
}
// Chain of keyless sources: retailer aggregate → beauty DB → food DB.
async function lookupSources(code){
  try{ // 1. UPCitemdb trial — aggregates Amazon/Walmart/etc. listings (keyless, rate-limited)
    const r=await fetch(`https://api.upcitemdb.com/prod/trial/lookup?upc=${encodeURIComponent(code)}`);
    if(r.ok){ const j=await r.json(); const it=j.items&&j.items[0];
      if(it&&it.title) return {name:it.title, brand:it.brand||"", cat:guessCat(it.title+" "+(it.category||"")), via:"retailer data"}; }
  }catch(e){}
  try{ // 2. Open Beauty Facts
    const r=await fetch(`https://world.openbeautyfacts.org/api/v2/product/${encodeURIComponent(code)}.json`);
    const j=await r.json();
    if(j.status===1&&j.product){ const p=j.product;
      return {name:p.product_name||p.generic_name||"", brand:(p.brands||"").split(",")[0].trim(), cat:guessCat((p.product_name||"")+" "+(p.categories||"")), via:"Open Beauty Facts"}; }
  }catch(e){}
  try{ // 3. Open Food Facts (some cosmetics are catalogued here)
    const r=await fetch(`https://world.openfoodfacts.org/api/v2/product/${encodeURIComponent(code)}.json`);
    const j=await r.json();
    if(j.status===1&&j.product){ const p=j.product;
      return {name:p.product_name||"", brand:(p.brands||"").split(",")[0].trim(), cat:guessCat((p.product_name||"")+" "+(p.categories||"")), via:"Open Food Facts"}; }
  }catch(e){}
  return null;
}
async function lookupBarcode(code){
  const status=$("#scanStatus"); status.textContent=`Looking up ${code}…`;
  let hit=null; try{ hit=await lookupSources(code); }catch(e){}
  if(hit&&hit.name){
    showCap("manual");
    if($("#mName")) $("#mName").value=hit.name;
    if($("#mBrand")) $("#mBrand").value=hit.brand||"";
    if(hit.cat&&CATS[hit.cat]&&$("#mCat")) $("#mCat").value=hit.cat;
    toast(hit.via?`Found via ${hit.via} — review & save`:"Found — review & save");
    return;
  }
  status.innerHTML=`Barcode <b>${esc(code)}</b> isn't in the free databases (common for K-beauty).<br>
    <a href="#" id="toAI" style="font-weight:700">📷 Identify with AI Photo →</a><br>
    <a href="#" id="toManual3">Enter it manually →</a> <a href="#" id="rescan" style="margin-left:10px">Rescan</a>`;
  if($("#toAI")) $("#toAI").onclick=e=>{e.preventDefault();showCap("ai");};
  if($("#toManual3")) $("#toManual3").onclick=e=>{e.preventDefault();showCap("manual");};
  if($("#rescan")) $("#rescan").onclick=e=>{e.preventDefault();capScan();};
}
function capManual(pref={}, editId=null){
  const catOpts=Object.keys(CATS).map(k=>`<option value="${k}">${CATS[k].emoji} ${CATS[k].label}</option>`).join("");
  const freqs=["Daily","Twice daily","2-3x/week","3-4x/week","Weekly","As needed","As desired"];
  $("#capBody").innerHTML=`
    <div class="field"><label>Product name</label><input class="f" id="mName" value="${esc(pref.name||"")}" placeholder="e.g. Centella Ampoule"></div>
    <div class="field"><label>Brand</label><input class="f" id="mBrand" value="${esc(pref.brand||"")}" placeholder="e.g. Skin1004"></div>
    <div class="field"><label>Category</label><select class="f" id="mCat">${catOpts}</select></div>
    <div class="field"><label>When</label><select class="f" id="mWhen">
      <option value="both">Morning & Evening</option><option value="am">Morning only</option><option value="pm">Evening only</option>
    </select></div>
    <div class="field"><label>Frequency</label><select class="f" id="mFreq">${freqs.map(f=>`<option>${f}</option>`).join("")}</select></div>
    <label class="checkrow"><input type="checkbox" id="mActive"> This is an active (retinol / acid / exfoliant — schedule it with cooldowns)</label>
    <button class="btn primary" id="mSave">${editId?"Save changes →":"Add to My Shelf →"}</button>
    ${editId?`<button class="btn ghost" id="mDelete" style="margin-top:8px">Remove from shelf</button>`:""}`;
  // apply prefill to selects/checkbox
  if(pref.cat && $("#mCat")) $("#mCat").value=pref.cat;
  if(pref.when && $("#mWhen")) $("#mWhen").value=pref.when;
  if(pref.freq && $("#mFreq")) $("#mFreq").value=pref.freq;
  if(pref.active && $("#mActive")) $("#mActive").checked=true;
  $("#mSave").onclick=()=>saveProduct(editId);
  if(editId && $("#mDelete")) $("#mDelete").onclick=()=>{ closeAdd(); removeProd(editId); };
}
function saveProduct(editId){
  const name=$("#mName").value.trim(), brand=$("#mBrand").value.trim();
  if(!name){ toast("Add a product name"); return; }
  const cat=$("#mCat").value, when=$("#mWhen").value, freq=$("#mFreq").value, isActive=$("#mActive").checked;
  const fields={
    name, brand:brand||"—", cat,
    am:when==="pm"?0:1, pm:when==="am"?0:1,
    freq, step:STEP_OF[cat]??3,
    cd:isActive?2:0, max:isActive?4:0,
    active:isActive?1:0,
    hydra:(cat==="serum"&&!isActive)?1:0,
  };
  if(editId){
    const p=DB.products.find(x=>x.id===editId);
    if(p) Object.assign(p, fields);   // keep id, qty, lastUsed
    toast("Saved changes");
  } else {
    const id=Math.max(0,...DB.products.map(p=>p.id),0)+1;
    DB.products.push({id, ...fields, qty:1, lastUsed:null});
    toast(`Added ${name}`);
  }
  save(); closeAdd(); renderChips(); renderShelf(); fillAnchor();
}
function capAI(){
  const savedKey=localStorage.getItem("skinritual-aikey")||"";
  if(!savedKey){
    // First-time setup: capture the key once, then never show it again.
    $("#capBody").innerHTML=`
      <p class="hint"><b>Take a photo, get the product.</b> AI reads the label and adds it — best for K-beauty &amp; niche skincare. One-time setup: paste your Anthropic key (stored only on this device). <a href="https://console.anthropic.com/settings/keys" target="_blank" rel="noopener">Get a key →</a></p>
      <div class="field"><label>Anthropic API key</label><input class="f" id="aiKey" type="password" placeholder="sk-ant-…"></div>
      <button class="btn primary" id="aiSaveKey">Save &amp; continue →</button>`;
    $("#aiSaveKey").onclick=()=>{ const k=$("#aiKey").value.trim(); if(!k){toast("Paste your key first");return;} localStorage.setItem("skinritual-aikey",k); capAI(); };
    return;
  }
  // Key present: live in-app camera with a shutter button.
  $("#capBody").innerHTML=`
    <p class="hint">Fill the frame with the front label, then tap the shutter.</p>
    <div id="aiCam" style="position:relative;border-radius:16px;overflow:hidden;background:#000">
      <video id="aiVideo" playsinline muted style="width:100%;display:block;aspect-ratio:3/4;object-fit:cover"></video>
      <button id="aiShutter" aria-label="Capture photo" style="position:absolute;left:50%;bottom:14px;transform:translateX(-50%);
        width:62px;height:62px;border-radius:50%;background:#fff;border:4px solid rgba(255,255,255,.55);
        box-shadow:0 2px 10px rgba(0,0,0,.4);cursor:pointer"></button>
    </div>
    <label class="btn ghost" style="display:block;cursor:pointer;margin-top:8px">🖼️ Choose from library instead
      <input id="aiFileLib" type="file" accept="image/*" style="display:none"></label>
    <div id="aiPreview" style="margin-top:12px"></div>
    <div class="hint" id="aiOut" style="margin-top:10px;text-align:center;min-height:18px"></div>
    <div class="hint" style="margin-top:16px;text-align:center"><a href="#" id="aiChangeKey">Change API key</a></div>`;
  if($("#aiShutter")) $("#aiShutter").onclick=captureAIFrame;
  if($("#aiFileLib")) $("#aiFileLib").onchange=e=>{ if(e.target.files&&e.target.files[0]) runAI(e.target.files[0]); };
  if($("#aiChangeKey")) $("#aiChangeKey").onclick=e=>{ e.preventDefault(); localStorage.removeItem("skinritual-aikey"); capAI(); };
  startAICamera();
}
async function startAICamera(){
  const box=$("#aiCam"), out=$("#aiOut");
  const fallback=msg=>{
    if(box) box.innerHTML=`<label class="btn primary" style="display:block;cursor:pointer;margin:0">📷 Take Product Photo
      <input id="aiFile" type="file" accept="image/*" capture="environment" style="display:none"></label>`;
    if($("#aiFile")) $("#aiFile").onchange=e=>{ if(e.target.files&&e.target.files[0]) runAI(e.target.files[0]); };
    if(msg&&out) out.textContent=msg;
  };
  const secure=window.isSecureContext||location.hostname==="localhost"||location.hostname==="127.0.0.1";
  if(!secure){ fallback("Camera needs a secure (https) connection."); return; }
  try{
    scanStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:"environment"}}});
    const v=$("#aiVideo"); if(!v){ stopScan(); return; }
    v.srcObject=scanStream; await v.play().catch(()=>{});
  }catch(e){ fallback("Allow camera access, or choose from your library."); }
}
function captureAIFrame(){
  const v=$("#aiVideo");
  if(!v||!v.videoWidth){ toast("Camera not ready yet"); return; }
  const c=document.createElement("canvas"); c.width=v.videoWidth; c.height=v.videoHeight;
  c.getContext("2d").drawImage(v,0,0,c.width,c.height);
  c.toBlob(blob=>{ if(blob){ stopScan(); runAI(blob); } else toast("Capture failed"); }, "image/jpeg", 0.85);
}
// Sensible AM/PM + frequency defaults from category (label rarely states these).
function whenFor(cat){ if(cat==="sunscreen")return "am"; if(["night_cream","retinol","exfoliant","spot","mask","sheet_mask"].includes(cat))return "pm"; return "both"; }
function freqFor(cat){ return ({retinol:"3-4x/week",exfoliant:"2-3x/week",mask:"Weekly",sheet_mask:"As desired",spot:"As needed"})[cat]||"Daily"; }
function fileToB64(f){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=rej;r.readAsDataURL(f);});}
async function runAI(file){
  const key=localStorage.getItem("skinritual-aikey")||"";
  const out=$("#aiOut"), prev=$("#aiPreview");
  if(!key){ capAI(); return; }
  if(!file){ return; }
  try{ const url=URL.createObjectURL(file); if(prev) prev.innerHTML=`<img src="${url}" style="width:100%;max-height:200px;object-fit:contain;border-radius:12px">`; }catch(e){}
  if(out) out.textContent="Reading the label…";
  try{
    const b64=await fileToB64(file);
    const mime=file.type||"image/jpeg";
    const body={
      model:"claude-sonnet-5", max_tokens:400,
      messages:[{role:"user",content:[
        {type:"image",source:{type:"base64",media_type:mime,data:b64}},
        {type:"text",text:'Identify this skincare product. Respond ONLY with JSON: {"name":"","brand":"","cat":"one of cleanser|toner|serum|eye_cream|moisturizer|night_cream|sunscreen|exfoliant|spot|mask|sheet_mask|retinol","active":true|false}. No prose.'}
      ]}]
    };
    const r=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"content-type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify(body)
    });
    const j=await r.json();
    const text=(j.content&&j.content[0]&&j.content[0].text)||"";
    const m=text.replace(/```json|```/g,"").match(/\{[\s\S]*\}/);
    if(!m) throw new Error("no json");
    const p=JSON.parse(m[0]);
    showCap("manual");
    if($("#mName")) $("#mName").value=p.name||"";
    if($("#mBrand")) $("#mBrand").value=p.brand||"";
    if(p.cat && CATS[p.cat] && $("#mCat")){ $("#mCat").value=p.cat;
      if($("#mWhen")) $("#mWhen").value=whenFor(p.cat);
      if($("#mFreq")) $("#mFreq").value=freqFor(p.cat);
    }
    if((p.active || p.cat==="retinol" || p.cat==="exfoliant") && $("#mActive")) $("#mActive").checked=true;
    if(!p.name && !p.brand){ throw new Error("blank"); }
    toast("Got it — review & save");
  }catch(e){
    if(prev) prev.innerHTML="";
    if(out) out.innerHTML=`Couldn't read that clearly. <a href="#" id="aiRetry">Try another photo →</a> · <a href="#" id="aiToManual">Enter manually →</a>`;
    if($("#aiRetry")) $("#aiRetry").onclick=ev=>{ev.preventDefault();capAI();};
    if($("#aiToManual")) $("#aiToManual").onclick=ev=>{ev.preventDefault();showCap("manual");};
  }
}

/* ============================================================
   Update escape hatch
   ============================================================ */
async function forceUpdate(){
  try{
    if("serviceWorker" in navigator){
      const regs=await navigator.serviceWorker.getRegistrations();
      await Promise.all(regs.map(r=>r.unregister()));
    }
    if(window.caches){ const keys=await caches.keys(); await Promise.all(keys.map(k=>caches.delete(k))); }
  }catch(e){}
  const u=new URL(location.href); u.searchParams.set("v", String(Date.now()));
  location.replace(u.toString());
}

   Navigation & init
   ============================================================ */
function switchView(v){
  $$("section.view").forEach(s=>s.classList.toggle("on", s.id==="view-"+v));
  $$("nav.tabs button").forEach(b=>b.classList.toggle("on", b.dataset.view===v));
  $("#fab").style.display = v==="shelf" ? "block" : "none";
  if(v==="shelf") renderShelf();
  if(v==="ritual"){ fillAnchor(); renderRitual(); }
  if(v==="rhythm") renderRhythm();
  window.scrollTo(0,0);
}

function init(){
  load();
  $("#boot").style.display="none";
  if($("#appFoot")) $("#appFoot").textContent=`skinritual · ${APP_VERSION}`;
  refreshStreak();
  renderChips(); renderShelf();

  $$("nav.tabs button").forEach(b=>b.onclick=()=>switchView(b.dataset.view));
  $$("#ritualSeg button").forEach(b=>b.onclick=()=>{
    mode=b.dataset.mode;
    $$("#ritualSeg button").forEach(x=>x.classList.toggle("on",x===b));
    renderRitual();
  });
  $("#buildBtn").onclick=renderRitual;
  $("#anchorSel").onchange=renderRitual;
  $("#searchIn").oninput=e=>{ query=e.target.value; renderShelf(); };
  $("#fab").onclick=openAdd;
  $("#closeAdd").onclick=closeAdd;
  $("#addModal").onclick=e=>{ if(e.target.id==="addModal") closeAdd(); };
  $$("#capModes button").forEach(b=>b.onclick=()=>showCap(b.dataset.cap));
  $("#updBtn").onclick=forceUpdate;
  $("#recap").onclick=e=>{ if(e.target.id==="recap") $("#recap").classList.remove("on"); };

  switchView("shelf");

  if("serviceWorker" in navigator){
    window.addEventListener("load",()=>navigator.serviceWorker.register("sw.js").catch(()=>{}));
  }
}
document.addEventListener("DOMContentLoaded",init);
