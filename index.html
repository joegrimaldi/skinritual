/* ============================================================
   Dopp Kit / travel mode — the kit is a VIEW of the shelf (trip.kit),
   scoped app-wide via inStock(). No copy, no migration.
   ============================================================ */
let tripDraft = new Set();
let tripNights = 3;
let tripBag = "carryon";        // planner staging
let tripChecked = new Set();    // planner staging: items moved to checked bag
let tripLeftHome = [];          // actives the trip is too short to justify

// ---- TSA 3-1-1 logic ----
const TSA = { maxMl:100, quartBagMl:950 };   // ≤100 mL/container; quart bag ≈ 950 mL usable
const OZ_TO_ML = 29.5735;
function parseSize(str){ if(str==null)return null; const s=String(str).toLowerCase().trim(); if(!s)return null;
  const n=parseFloat(s); if(!isFinite(n))return null; const ml=/oz/.test(s)?n*OZ_TO_ML:n; return Math.round(Math.max(1,Math.min(1000,ml))); }
function formOf(p){ return p.form || (["sheet_mask","spot"].includes(p.cat)?"solid":"liquid"); }
function isLiquidP(p){ const f=formOf(p); return f==="liquid"||f==="aerosol"; }
function effMl(p){ return p.decant!=null ? p.decant : (p.sizeMl!=null ? p.sizeMl : null); }
function carryOk(p){ if(!isLiquidP(p)) return true; const m=effMl(p); return m!=null && m<=TSA.maxMl; }
// TSA carry-on compliance: solids always OK; explicit checkbox wins; undefined → size math.
function tsaOk(p){ if(!isLiquidP(p)) return true; if(p.tsa===1||p.tsa===true) return true; if(p.tsa===0||p.tsa===false) return false; return carryOk(p); }

// ---- unified kit/bag/checked accessors (work on active trip OR draft) ----
function inKit(id){ return DB.trip ? DB.trip.kit.includes(id) : tripDraft.has(id); }
function toggleKit(id){ if(DB.trip){ const i=DB.trip.kit.indexOf(id); i>=0?DB.trip.kit.splice(i,1):DB.trip.kit.push(id); save(); } else { tripDraft.has(id)?tripDraft.delete(id):tripDraft.add(id); } }
function curKit(){ return DB.trip ? DB.trip.kit.slice() : [...tripDraft]; }
function curBag(){ return DB.trip ? (DB.trip.bag||"carryon") : tripBag; }
function setBag(b){ if(DB.trip){ DB.trip.bag=b; save(); } else tripBag=b; }
function isChecked(id){ return DB.trip ? (DB.trip.checked||[]).includes(id) : tripChecked.has(id); }
function setChecked(id,on){ if(DB.trip){ const c=DB.trip.checked||(DB.trip.checked=[]); const i=c.indexOf(id); if(on&&i<0)c.push(id); if(!on&&i>=0)c.splice(i,1); save(); } else { on?tripChecked.add(id):tripChecked.delete(id); } }

// Auto-pack: the minimum kit that preserves the real ritual for `nights`, tuned
// for reuse, TSA-fit, and an extended facial. Reuses the engine (no trip active
// here, so inStock = full shelf).
function proposeKit(nights, bag){
  const carryon = (bag||curBag())==="carryon";
  const chosen=new Set(), leftHome=[];
  // 1. core daily staples: what the engine actually picks AM + PM (one-per-kind, rotation-aware)
  ["am","pm"].forEach(m=>buildRoutine(m,{scope:"daily"}).steps.forEach(s=>{ if(s.p.id>0) chosen.add(s.p.id); }));
  // 2. actives earn their space only if usable ≥2× on the trip (nights > cooldown); else leave home
  [...chosen].forEach(id=>{ const p=DB.products.find(x=>x.id===id);
    if(p && p.active && !(nights>p.cd)){ chosen.delete(id); leftHome.push(p); } });
  // 3. extended-facial supplement for trips ≥2 nights: a mask + a sheet mask (reusable indulgences)
  if(nights>=2){
    const mask=inStock(p=>p.cat==="mask")[0]; if(mask) chosen.add(mask.id);
    const sheet=inStock(p=>p.cat==="sheet_mask")[0]; if(sheet) chosen.add(sheet.id);
  }
  // 4. Carry-on TSA pass: any non-carry-on item → swap for a carry-on same-category
  //    alternative; if none exists, drop it and note it as left home.
  if(carryon){
    [...chosen].forEach(id=>{ const p=DB.products.find(x=>x.id===id);
      if(p && !tsaOk(p)){
        const alt=DB.products.find(x=>x.qty>0 && x.cat===p.cat && x.id!==id && !chosen.has(x.id) && tsaOk(x));
        if(alt){ chosen.delete(id); chosen.add(alt.id); }
        else { chosen.delete(id); leftHome.push(p); }
      }});
  }
  return {kit:[...chosen], leftHome};
}
function applyProposal(){ const r=proposeKit(tripNights); tripDraft=new Set(r.kit); tripLeftHome=r.leftHome; }
function openTrip(){ if(!DB.trip){ tripDraft=new Set(); tripNights=3; tripBag="carryon"; tripChecked=new Set(); applyProposal(); } $("#tripModal").classList.add("on"); renderTripSheet(); }
function closeTrip(){ $("#tripModal").classList.remove("on"); }
function afterKitChange(){ save(); renderTripSheet(); refreshTrip(); renderShelf(); if($("#view-ritual").classList.contains("on")) renderRitual(); }

function renderTripSheet(){
  const body=$("#tripBody"); if(!body) return;
  const active=!!DB.trip;
  const stock=DB.products.filter(p=>p.qty>0);
  const kit=curKit();
  $("#tripTitle").textContent = active ? "Your Dopp kit" : "Pack your Dopp kit";
  if(!stock.length){ body.innerHTML=`<div class="empty">Add products on the Shelf tab first.</div>`; return; }

  const carryon = curBag()==="carryon";
  const kitLiquids = kit.map(id=>DB.products.find(p=>p.id===id)).filter(p=>p&&isLiquidP(p)&&!isChecked(p.id));
  const load = kitLiquids.reduce((s,p)=>{const m=effMl(p); return s+(m!=null?m:0);},0);
  const over = kitLiquids.filter(p=>!tsaOk(p));
  const pct = Math.min(100, Math.round(load/TSA.quartBagMl*100));

  let html = active
    ? `<div class="amsub">✈️ ${DB.trip.nights}-night trip · ${kit.length} item${kit.length===1?"":"s"} packed.</div>`
    : `<div class="tripnights"><span>Nights</span><div class="qbtns"><button class="qbtn" data-n="-1">−</button><span id="tripN" class="qn">${tripNights}</span><button class="qbtn" data-n="1">+</button></div></div>`;
  html += `<div class="segwrap" id="bagSeg" style="margin:4px 0 12px">
      <button data-bag="carryon" class="${carryon?"on":""}">🧴 Carry-on</button>
      <button data-bag="checked" class="${carryon?"":"on"}">🧳 Checked</button></div>`;
  if(kit.length && carryon){
    html += `<div class="qmeter"><div class="qbar"><div class="qfill" style="width:${pct}%"></div></div>
      <div class="qlab">🧴 Liquids bag: ${Math.round(load)} / ~${TSA.quartBagMl} mL${over.length?` · ⚠️ ${over.length} not carry-on`:""}</div></div>`;
  } else if(kit.length && !carryon){
    html += `<div class="amsub">🧳 Checked bag — no liquid size limits. Sizes shown for packing only.</div>`;
  }
  if(!active){
    html += `<div class="amsub">✨ Auto-packed <b>${kit.length}</b> item${kit.length===1?"":"s"} for ${tripNights} night${tripNights===1?"":"s"} — TSA-fit, reusable, facial-ready. <a href="#" id="repack">↻ re-pack</a></div>`;
    if(tripLeftHome.length) html += `<div class="stepnote" style="background:rgba(185,138,62,.12);padding:10px 12px;border-radius:10px;margin-bottom:12px">🏠 Left home: ${esc(tripLeftHome.map(p=>p.name).join(", "))} — ${carryon?"not carry-on friendly, or the ":"the "}trip's too short to justify ${tripLeftHome.length>1?"them":"it"}.</div>`;
  }
  // Row renderer (shared by the packed list and the add-more section)
  const rowFor = p=>{
    const k=inKit(p.id), liq=isLiquidP(p), chk=isChecked(p.id), m=effMl(p), ok=tsaOk(p);
    let chip;
    if(!liq) chip=`<span class="sizechip solid">solid</span>`;
    else if(chk) chip=`<span class="sizechip checked" data-uncheck="${p.id}">✈️ checked</span>`;
    else if(m!=null) chip=`<span class="sizechip ${ok?"ok":"warn"}" data-size="${p.id}">${m} mL${p.decant!=null?" · decant":""}</span>`;
    else if(ok) chip=`<span class="sizechip ok" data-size="${p.id}">✈️ carry-on</span>`;
    else if(p.tsa===0||p.tsa===false) chip=`<span class="sizechip warn" data-size="${p.id}">⚠️ not carry-on</span>`;
    else chip=`<span class="sizechip warn" data-size="${p.id}">size?</span>`;
    const fix = (k&&liq&&!chk&&carryon&&!ok)
      ? `<div class="kitfix">⚠️ not carry-on — <button data-fix="swap" data-id="${p.id}">swap smaller</button> · <button data-fix="decant" data-id="${p.id}">decant</button> · <button data-fix="checked" data-id="${p.id}">checked bag</button></div>` : "";
    return `<div class="kitrow ${k?"on":""}">
      <button class="kittoggle" data-kit="${p.id}"><span class="amadd">${k?"✓":"＋"}</span><span class="amn"><b>${esc(p.brand)}</b> · ${esc(p.name)}</span></button>
      ${chip}${fix}</div>`;
  };
  const byStep = (a,b)=>(STEP_OF[a.cat]??9)-(STEP_OF[b.cat]??9) || a.name.localeCompare(b.name);

  // PRIMARY: the recommended / packed kit
  const packed = kit.map(id=>DB.products.find(p=>p.id===id)).filter(Boolean).sort(byStep);
  html += `<div class="amcat" style="margin:14px 0 6px">${active?"✈️ In your kit":"✨ Recommended kit"} · ${packed.length}</div>`;
  html += packed.length ? packed.map(rowFor).join("") : `<div class="amsub">Nothing packed yet — add from your shelf below.</div>`;

  // SECONDARY: add more from the shelf (collapsed)
  const unpacked = stock.filter(p=>!inKit(p.id)).sort(byStep);
  if(unpacked.length){
    html += `<details class="amgroup" style="margin-top:12px"><summary>＋ Add more from your shelf <span class="amcount">${unpacked.length}</span></summary>`
      + unpacked.map(rowFor).join("") + `</details>`;
  }
  html += active
    ? `<button class="btn ghost" id="endTripBtn" style="margin-top:18px">End trip — back to full shelf</button>`
    : `<button class="btn primary" id="startTripBtn" style="margin-top:18px">Start trip →</button>`;
  body.innerHTML=html;

  body.querySelectorAll("[data-n]").forEach(b=>b.onclick=()=>{ tripNights=Math.max(1,Math.min(60,tripNights+(+b.dataset.n))); applyProposal(); renderTripSheet(); });
  if($("#repack")) $("#repack").onclick=e=>{ e.preventDefault(); applyProposal(); renderTripSheet(); };
  body.querySelectorAll("[data-bag]").forEach(b=>b.onclick=()=>{ setBag(b.dataset.bag); if(!active) applyProposal(); renderTripSheet(); });
  body.querySelectorAll("[data-kit]").forEach(b=>b.onclick=()=>{ toggleKit(+b.dataset.kit); afterKitChange(); });
  body.querySelectorAll("[data-size]").forEach(b=>b.onclick=()=>{
    const p=DB.products.find(x=>x.id===+b.dataset.size); if(!p) return;
    const v=prompt(`Container size for ${p.name} (mL, or e.g. 1.7oz):`, p.sizeMl!=null?String(p.sizeMl):"");
    if(v==null) return; const ml=parseSize(v);
    if(ml){ p.sizeMl=ml; save(); renderTripSheet(); } else if(v.trim()) toast("Didn't understand that size");
  });
  body.querySelectorAll("[data-uncheck]").forEach(b=>b.onclick=()=>{ setChecked(+b.dataset.uncheck,false); renderTripSheet(); refreshTrip(); });
  body.querySelectorAll("[data-fix]").forEach(b=>b.onclick=()=>tripFix(b.dataset.fix, +b.dataset.id));
  if($("#startTripBtn")) $("#startTripBtn").onclick=startTrip;
  if($("#endTripBtn")) $("#endTripBtn").onclick=endTrip;
}
function tripFix(kind, id){
  const p=DB.products.find(x=>x.id===id); if(!p) return;
  if(kind==="swap"){
    const alt=DB.products.find(x=>x.qty>0 && x.cat===p.cat && x.id!==id && !inKit(x.id) && tsaOk(x));
    if(!alt){ toast(`No carry-on ${catInfo(p.cat).label.toLowerCase()} on your shelf`); return; }
    toggleKit(id); if(!inKit(alt.id)) toggleKit(alt.id);
    toast(`Swapped in ${alt.name}`); afterKitChange();
  } else if(kind==="decant"){
    p.decant=TSA.maxMl; p.tsa=1; save(); toast("Marked decanted (≤100 mL travel bottle)"); renderTripSheet(); refreshTrip();
  } else if(kind==="checked"){
    setChecked(id,true); toast("Moved to checked bag"); renderTripSheet(); refreshTrip();
  }
}
function startTrip(){
  if(!tripDraft.size){ toast("Pick at least one product to pack"); return; }
  DB.trip={ start:Date.now(), nights:tripNights, bag:tripBag, kit:[...tripDraft], packed:[], checked:[...tripChecked] };
  save(); closeTrip(); refreshTrip(); toast("Trip started ✈️"); renderShelf();
  if($("#view-ritual").classList.contains("on")) renderRitual();
}
function endTrip(){
  if(!confirm("End trip? Your kit dissolves back into the full shelf — all history is kept.")) return;
  DB.trip=null; save(); closeTrip(); refreshTrip(); toast("Trip ended"); renderShelf();
  if($("#view-ritual").classList.contains("on")) renderRitual();
}
function refreshTrip(){
  const chip=$("#tripChip"), btn=$("#tripBtn");
  if(DB.trip){
    const left=Math.max(0, DB.trip.nights - daysSince(DB.trip.start));
    if(chip){ chip.style.display=""; chip.textContent=`✈️ ${left}n`; }
    if(btn) btn.classList.add("on");
  } else { if(chip) chip.style.display="none"; if(btn) btn.classList.remove("on"); }
}

/* ============================================================
   Navigation & init
   ============================================================ */
function switchView(v){
  $$("section.view").forEach(s=>s.classList.toggle("on", s.id==="view-"+v));
  $$("nav.tabs button").forEach(b=>b.classList.toggle("on", b.dataset.view===v));
  $("#fab").style.display = v==="shelf" ? "block" : "none";
  if(v==="shelf") renderShelf();
  if(v==="ritual"){ renderRitual(); }
  if(v==="rhythm") renderRhythm();
  window.scrollTo(0,0);
}

function init(){
  load();
  $("#boot").style.display="none";
  refreshStreak(); refreshTrip(); updateTierLabels();
  renderChips(); renderShelf();

  $$("nav.tabs button").forEach(b=>b.onclick=()=>switchView(b.dataset.view));
  $$("#periodSeg button").forEach(b=>b.onclick=()=>{
    period=b.dataset.period; tierIx=0;
    $$("#periodSeg button").forEach(x=>x.classList.toggle("on",x===b));
    $$("#tierSeg button").forEach((x,i)=>x.classList.toggle("on",i===0));
    updateTierLabels(); renderRitual();
  });
  $$("#tierSeg button").forEach(b=>b.onclick=()=>{
    tierIx=+b.dataset.tier;
    $$("#tierSeg button").forEach(x=>x.classList.toggle("on",x===b));
    renderRitual();
  });
  $("#shaveTog").onclick=()=>{ includeShave=!includeShave; $("#shaveTog").classList.toggle("on",includeShave); renderRitual(); };
  $("#noseTog").onclick=()=>{ includeNoseWax=!includeNoseWax; $("#noseTog").classList.toggle("on",includeNoseWax); renderRitual(); };
  $("#dryTog").onclick=()=>{ includeDryBrush=!includeDryBrush; $("#dryTog").classList.toggle("on",includeDryBrush); renderRitual(); };
  $("#searchIn").oninput=e=>{ query=e.target.value; renderShelf(); };
  $("#fab").onclick=openAdd;
  $("#closeAdd").onclick=closeAdd;
  $("#addModal").onclick=e=>{ if(e.target.id==="addModal") closeAdd(); };
  $$("#capModes button").forEach(b=>b.onclick=()=>showCap(b.dataset.cap));
  $("#updBtn").onclick=forceUpdate;
  $("#tripBtn").onclick=openTrip;
  $("#closeTrip").onclick=closeTrip;
  $("#tripModal").onclick=e=>{ if(e.target.id==="tripModal") closeTrip(); };
  $("#recap").onclick=e=>{ if(e.target.id==="recap") $("#recap").classList.remove("on"); };

  switchView("shelf");

  if("serviceWorker" in navigator){
    window.addEventListener("load",()=>navigator.serviceWorker.register("sw.js").catch(()=>{}));
  }
}
document.addEventListener("DOMContentLoaded",init);
</script>
</body>
